        try { localStorage.setItem('tokenomics-dashboard-mode', dashboardMode); } catch {}
      }
      if (dashboardMode === 'overview' && ['projects-section', 'efficiency-section'].includes(activeSectionTarget)) {
        activeSectionTarget = 'overview-section';
      }
      if (cachedSummary) {
        renderRecommendations(cachedSummary);
        renderModelAnalysis(cachedSummary);
        if (dashboardMode !== 'settings') {
          requestAnimationFrame(() => {
            renderDailyTokenChart(tokenFlowRows());
            if (dashboardMode === 'analyst') {
              renderProjectDailyChart(selectedProjectFromSummary(cachedSummary));
              loadSelectedProjectTimeline();
            }
          });
          loadGlobalTimelineView();
        }
      }
      syncSectionNav();
    }

    function aggregateTimelineRows(rows, resolution) {
      const buckets = new Map();
      for (const row of rows || []) {
        const name = TokenomicsTimeline.bucketName(row.name, resolution);
        if (!buckets.has(name)) buckets.set(name, { name, ...emptyPeriodStats(), models: new Map() });
        const target = buckets.get(name);
        addPeriodStats(target, row);
        for (const model of row.models || []) {
          const key = model.name || (model.provider + '/' + model.model);
          if (!target.models.has(key)) target.models.set(key, { name: key, provider: model.provider, model: model.model, ...emptyPeriodStats() });
          addPeriodStats(target.models.get(key), model);
        }
      }
      return [...buckets.values()].map(row => ({
        ...row,
        models: [...row.models.values()].sort((a, b) => b.costUsd - a.costUsd || a.name.localeCompare(b.name)),
      })).sort((a, b) => a.name.localeCompare(b.name));
    }

    function timelineRangeKey(range) {
      return range.mode === 'absolute'
        ? 'absolute:' + (range.from || '') + ':' + (range.to || '')
        : (range.calendarMonth
          ? 'relative:month:' + (range.monthStartAt || '') + ':' + (range.monthEndAt || '')
          : 'relative:' + (Number.isFinite(range.days) ? range.days : 'all'));
    }

    function timelineRangeQuery(range) {
      if (range.mode === 'absolute') return { from: range.from || undefined, to: range.to || undefined };
      if (range.calendarMonth) return { fromAt: range.monthStartAt || undefined, toAt: range.monthEndAt || undefined };
      return Number.isFinite(range.days) ? { days: range.days } : {};
    }

    function timelineDateBounds(rows) {
      const dates = (rows || []).map(row => row.name.slice(0, 10)).filter(Boolean).sort();
      return dates.length ? { min: dates[0], max: dates.at(-1) } : { min: '', max: '' };
    }

    function renderTimelineDateControls(kind, rows) {
      const range = timelineRanges[kind];
      const bounds = timelineDateBounds(rows);
      range.availableFrom = bounds.min;
      range.availableTo = bounds.max;
      const from = document.getElementById(kind + '-date-from');
      const to = document.getElementById(kind + '-date-to');
      if (!range.from || (bounds.min && (range.from < bounds.min || range.from > bounds.max))) range.from = bounds.min;
      if (!range.to || (bounds.max && (range.to < bounds.min || range.to > bounds.max))) range.to = bounds.max;
      if (range.from && range.to && range.from > range.to) {
        range.from = bounds.min;
        range.to = bounds.max;
      }
      for (const input of [from, to]) {
        input.min = bounds.min;
        input.max = bounds.max;
      }
      from.value = range.from;
      to.value = range.to;
      document.querySelectorAll('#' + kind + '-date-mode-controls [data-timeline-date-mode]').forEach(button => {
        const active = button.dataset.timelineDateMode === range.mode;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      const relative = document.getElementById(kind + '-relative-range');
      relative.value = range.calendarMonth ? 'month' : (Number.isFinite(range.days) ? String(range.days) : 'all');
      relative.classList.toggle('is-hidden', range.mode !== 'relative');
      document.getElementById(kind + '-absolute-range').classList.toggle('is-hidden', range.mode !== 'absolute');
    }

    function timelineRangeDomain(range) {
      return TokenomicsTimeline.rangeDomain(range);
    }

    function visibleDomainLabel(domain, resolution, localCalendar = false) {
      const start = new Date(domain.start);
      const end = new Date(domain.end - 1);
      const options = resolution === '15m' || resolution === 'hourly'
        ? { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }
        : { year: 'numeric', month: 'short', day: 'numeric' };
      if (!localCalendar) options.timeZone = 'UTC';
      return start.toLocaleString([], options) + ' - ' + end.toLocaleString([], options);
    }

    function globalTimelineKey() {
      return timelineGeneration + ':' + timelineRangeKey(timelineRanges.token);
    }

    function projectTimelineKey(project) {
      return timelineGeneration + ':' + (project?.name || '<none>') + ':' + timelineRangeKey(timelineRanges.project);
    }

    function currentGlobalTimeline() {
      return globalTimelineCache.get(globalTimelineKey()) || [];
    }

    function tokenFlowRows() {
      return currentGlobalTimeline();
    }

    function projectTimelineRows(project) {
      if (!project) return [];
      return projectTimelineCache.get(projectTimelineKey(project)) || [];
    }

    function periodLabel(name) {
      if (/^\d{4}$/.test(name)) return name;
      if (name.length === 10) return name;
      const date = new Date(TokenomicsTimeline.periodStart(name));
      if (Number.isNaN(date.getTime())) return name;
      if (/^\d{4}-\d{2}$/.test(name)) return date.toLocaleDateString([], { month: 'short', year: 'numeric', timeZone: 'UTC' });
      return date.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function emptyPeriodStats() {
      return {
        requests: 0,
        pricedRequests: 0,
        unpricedRequests: 0,
        input: 0,
        cacheCreate5m: 0,
        cacheCreate30m: 0,
        cacheCreate1h: 0,
        cacheRead: 0,
        output: 0,
        reasoningOutput: 0,
        pricedInput: 0,
        pricedCacheCreate5m: 0,
        pricedCacheCreate30m: 0,
        pricedCacheCreate1h: 0,
        pricedCacheRead: 0,
        pricedOutput: 0,
        pricedReasoningOutput: 0,
        costUsd: 0,
        costsUsd: { input: 0, cacheCreate5m: 0, cacheCreate30m: 0, cacheCreate1h: 0, cacheRead: 0, output: 0 },
      };
    }

    function addPeriodStats(target, row = {}) {
      for (const key of [
        'requests', 'pricedRequests', 'unpricedRequests',
        'input', 'cacheCreate5m', 'cacheCreate30m', 'cacheCreate1h', 'cacheRead', 'output', 'reasoningOutput',
        'pricedInput', 'pricedCacheCreate5m', 'pricedCacheCreate30m', 'pricedCacheCreate1h', 'pricedCacheRead', 'pricedOutput', 'pricedReasoningOutput',
        'costUsd',
      ]) {
        target[key] += row[key] || 0;
      }
      for (const key of ['input', 'cacheCreate5m', 'cacheCreate30m', 'cacheCreate1h', 'cacheRead', 'output']) {
        target.costsUsd[key] += row.costsUsd?.[key] || 0;
      }
      return target;
    }

    function sumPeriodStats(rows) {
      return (rows || []).reduce(addPeriodStats, emptyPeriodStats());
    }

    function modelDateBounds(summary) {
      const days = (summary.providerModelEffortDaily || [])
        .flatMap(group => group.daily || [])
        .map(row => row.name)
        .filter(name => /^\d{4}-\d{2}-\d{2}$/.test(name))
        .sort();
      return days.length ? { min: days[0], max: days.at(-1) } : { min: null, max: null };
    }

    function configureModelDateInputs(summary) {
      const bounds = modelDateBounds(summary);
      const from = document.getElementById('model-date-from');
      const to = document.getElementById('model-date-to');
      for (const input of [from, to]) {
        input.min = bounds.min || '';
        input.max = bounds.max || '';
        input.disabled = !bounds.min;
      }
      if (bounds.min && !from.value) from.value = bounds.min;
      if (bounds.max && !to.value) to.value = bounds.max;
      return bounds;
    }

    function selectedModelDateRange(summary) {
      const bounds = configureModelDateInputs(summary);
      if (!bounds.min) return { from: null, to: null, includeUnknown: modelRelativeDays === Infinity };
      if (modelDateMode === 'absolute') {
        const from = document.getElementById('model-date-from').value || bounds.min;
        const to = document.getElementById('model-date-to').value || bounds.max;
        return { from: from <= to ? from : to, to: from <= to ? to : from, includeUnknown: false };
      }
      if (modelRelativeDays === 'month') {
        return {
          from: summary.currentMonth?.name ? summary.currentMonth.name + '-01' : bounds.max.slice(0, 7) + '-01',
          to: summary.currentMonth?.through || bounds.max,
          includeUnknown: false,
        };
      }
      if (!Number.isFinite(modelRelativeDays)) return { from: bounds.min, to: bounds.max, includeUnknown: true };
      const lastTime = Date.parse(bounds.max + 'T00:00:00Z');
      const from = new Date(lastTime - (modelRelativeDays - 1) * 86_400_000).toISOString().slice(0, 10);
      return { from, to: bounds.max, includeUnknown: false };
    }

    function modelDayInRange(name, range) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(name)) return range.includeUnknown;
      return (!range.from || name >= range.from) && (!range.to || name <= range.to);
    }

    function modelEffortRowsInRange(summary) {
      const range = selectedModelDateRange(summary);
      const rows = (summary.providerModelEffortDaily || []).map(group => ({
        provider: group.provider,
        model: group.model,
        effort: group.effort,
        ...sumPeriodStats((group.daily || []).filter(row => modelDayInRange(row.name, range))),
      })).filter(row => row.requests > 0 || totalTokens(row) > 0 || row.costUsd > 0);
      rows.sort((a, b) => (b.costUsd || 0) - (a.costUsd || 0) || totalTokens(b) - totalTokens(a) || a.model.localeCompare(b.model));
      return { range, rows };
    }

    function collapseModelRows(rows) {
      const grouped = new Map();
      for (const row of rows) {
        const key = row.provider + '\u0000' + row.model;
        const target = grouped.get(key) || { provider: row.provider, model: row.model, ...emptyPeriodStats() };
        addPeriodStats(target, row);
        grouped.set(key, target);
      }
      return [...grouped.values()].sort((a, b) => (b.costUsd || 0) - (a.costUsd || 0) || a.model.localeCompare(b.model));
    }

    function effortLabel(row) {
      if (row.effort && row.effort !== '<unknown>') return row.effort;
      return row.provider === 'openai' ? 'Unknown' : 'n/a';
    }

    function formatModelPeriod(range) {
      if (!range.from && !range.to) return 'No dated usage';
      if (range.includeUnknown && modelDateMode === 'relative' && !Number.isFinite(modelRelativeDays)) return 'All time';
      return range.from === range.to ? range.from : range.from + ' to ' + range.to;
    }

    function renderModelDateControls(summary) {
      document.querySelectorAll('#model-date-mode-controls [data-model-date-mode]').forEach(button => {
        const active = button.dataset.modelDateMode === modelDateMode;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      document.getElementById('model-relative-range').classList.toggle('is-hidden', modelDateMode !== 'relative');
      document.getElementById('model-absolute-range').classList.toggle('is-hidden', modelDateMode !== 'absolute');
      configureModelDateInputs(summary);
    }

    function renderModelRanking(rows, totalStats) {
      const container = document.getElementById('model-ranking');
      const visibleRows = rows.slice(0, overviewModelLimit);
      const maxCost = Math.max(1, ...visibleRows.map(row => row.costUsd || 0));
      const totalCost = Math.max(1, totalStats.costUsd || 0);
      container.innerHTML = '<table class="model-table"><thead><tr><th>Model</th><th>Cost</th><th>Share</th><th></th></tr></thead><tbody>' +
        visibleRows.map(row => {
          const share = (row.costUsd || 0) / totalCost;
          const width = ((row.costUsd || 0) / maxCost) * 100;
          return '<tr>' +
            '<td class="model-name" title="' + esc(row.provider + '/' + row.model) + '">' + esc(row.model) + '<span class="model-provider">' + esc(row.provider) + '</span></td>' +
            '<td>' + esc(formatUsdCompact(row.costUsd || 0)) + '</td>' +
            '<td>' + esc(formatPct(share)) + '</td>' +
            '<td><div class="rank-bar-track"><span class="rank-bar" style="width:' + width.toFixed(1) + '%"></span></div></td>' +
            '</tr>';
        }).join('') + '</tbody></table>';
    }

    function modelMetricCell(row, key) {
      const mix = costMix(row);
      return '<span class="metric-cell"><strong>' + esc(formatTokenCount(segmentTokens(row, key))) + '</strong>' +
        '<span>' + esc(formatUsdCompact(segmentCost(row, key))) + ' · ' + esc(formatPct(mix[key + 'Pct'] || 0)) + '</span></span>';
    }

    function modelTableRow(row, totalCost, total = false) {
      return '<tr>' +
        '<td title="' + esc(row.provider + '/' + row.model) + '">' + esc(row.model) + (total ? '' : '<span class="model-provider">' + esc(row.provider) + '</span>') + '</td>' +
        '<td>' + (total ? '' : esc(effortLabel(row))) + '</td>' +
        '<td>' + esc(formatTokenCount(row.requests || 0)) + '</td>' +
        '<td>' + esc(formatUsdCompact(row.costUsd || 0)) + '</td>' +
        '<td>' + esc(formatPct(total ? 1 : (totalCost > 0 ? (row.costUsd || 0) / totalCost : 0))) + '</td>' +
        '<td>' + modelMetricCell(row, 'input') + '</td>' +
        '<td>' + modelMetricCell(row, 'cache') + '</td>' +
        '<td>' + modelMetricCell(row, 'output') + '</td>' +
        '</tr>';
    }

    function renderModels(summary) {
      renderModelDateControls(summary);
      const { range, rows } = modelEffortRowsInRange(summary);
      const totalStats = sumPeriodStats(rows);
      const models = collapseModelRows(rows);
      document.getElementById('models-summary').textContent =
        formatModelPeriod(range) + ' · ' + models.length + ' models · ' + rows.length + ' model/effort rows · ' + formatUsdCompact(totalStats.costUsd || 0);
      renderModelRanking(models, totalStats);
      const table = document.getElementById('models-table');
      table.innerHTML = '<thead><tr><th>Model</th><th>Effort</th><th>Requests</th><th>Cost</th><th>Share</th><th>Input tokens</th><th>Cache tokens</th><th>Output tokens</th></tr></thead>' +
        '<tbody>' + (rows.length ? rows.map(row => modelTableRow(row, totalStats.costUsd || 0)).join('') : '<tr><td colspan="8" class="muted">No usage in this period</td></tr>') + '</tbody>' +
        (rows.length ? '<tfoot>' + modelTableRow({ provider: '', model: 'Total', effort: '', ...totalStats }, totalStats.costUsd || 0, true) + '</tfoot>' : '');
    }

    function renderModelAnalysis(summary) {
      renderModels(summary);
      renderEfficiency(summary);
    }

    function renderEfficiency(summary) {
      const table = document.getElementById('efficiency-table');
      const select = document.getElementById('efficiency-model-select');
      if (!table || !select) return;
      const { range, rows: allRows } = modelEffortRowsInRange(summary);
      const models = collapseModelRows(allRows);
      const options = models.map(row => ({
        key: JSON.stringify([row.provider, row.model]),
        label: row.model + ' · ' + row.provider,
      }));
      if (!options.some(option => option.key === efficiencyModelKey)) efficiencyModelKey = options[0]?.key || null;
      select.innerHTML = options.length
        ? options.map(option => '<option value="' + esc(option.key) + '">' + esc(option.label) + '</option>').join('')
        : '<option value="">No model data</option>';
      select.disabled = options.length === 0;
      if (efficiencyModelKey) select.value = efficiencyModelKey;
      const [provider, model] = efficiencyModelKey ? JSON.parse(efficiencyModelKey) : ['', ''];
      const rows = allRows.filter(row => row.provider === provider && row.model === model);
      document.getElementById('efficiency-summary').textContent = rows.length
        ? formatModelPeriod(range) + ' · descriptive usage events only · no outcome-adjusted efficiency verdict'
        : 'No comparable model/effort cohorts in this period';
      table.innerHTML = '<thead><tr>' +
        '<th>Effort</th><th>Usage events</th><th>Tariff coverage</th><th>Estimated spend</th><th>Avg $/covered event</th>' +
        '<th>Input / covered event</th><th>Cache / covered event</th><th>Output / covered event</th>' +
        '<th>Amortized $/1M output</th><th>Output tariff $/1M</th><th>Cache-read share</th><th>Reasoning share</th>' +
        '</tr></thead><tbody>' +
        rows.map(row => (
          '<tr>' +
          '<td>' + esc(effortLabel(row)) + '</td>' +
          '<td>' + esc(formatTokenCount(row.requests || 0)) + '</td>' +
          '<td>' + esc(formatPct(pricedShare(row))) + '</td>' +
          '<td>' + esc(formatNullableUsd(pricedCost(row))) + '</td>' +
          '<td>' + esc(formatNullableUsd(avgPricedCost(row))) + '</td>' +
          '<td>' + esc(row.pricedRequests > 0 ? formatTokenCount((row.pricedInput || 0) / row.pricedRequests) : 'n/a') + '</td>' +
          '<td>' + esc(row.pricedRequests > 0 ? formatTokenCount(pricedTokenCache(row) / row.pricedRequests) : 'n/a') + '</td>' +
          '<td>' + esc(row.pricedRequests > 0 ? formatTokenCount(pricedOutputTokens(row) / row.pricedRequests) : 'n/a') + '</td>' +
          '<td>' + esc(formatNullableUsd(totalCostPerMillionOutput(row))) + '</td>' +
          '<td>' + esc(formatNullableUsd(outputCostPerMillionOutput(row))) + '</td>' +
          '<td>' + esc(Number.isFinite(cacheReadShare(row)) ? formatPct(cacheReadShare(row)) : 'n/a') + '</td>' +
          '<td>' + esc(formatRatio(row.pricedReasoningOutput || 0, pricedOutputTokens(row))) + '</td>' +
          '</tr>'
        )).join('') + (rows.length ? '' : '<tr><td colspan="12" class="muted">No usage in this period</td></tr>') +
        '</tbody>';
    }

    function renderRecommendations(summary) {
      const container = document.getElementById('recommendations-list');
      const allRows = summary.recommendations || [];
      const rows = dashboardMode === 'overview' ? allRows.slice(0, 3) : allRows;
      const summaryEl = document.getElementById('recommendations-summary');
      summaryEl.textContent = rows.length ? rows.length + ' prioritized findings' : '';
      if (!rows.length) {
        container.innerHTML = '<div class="recommendation-item"><div class="recommendation-title">No high-confidence recommendations</div><p class="recommendation-meta">Current rules did not find a material, well-supported action.</p></div>';
        return;
      }
      container.innerHTML = rows.map(row => (
        '<article class="recommendation-item" data-recommendation-id="' + esc(row.id) + '">' +
          '<div class="recommendation-head"><div class="recommendation-title">' + esc(row.title) + '</div>' +
          (row.impactUsd == null ? '' : '<div class="recommendation-impact">Δ ' + esc(formatUsdCompact(row.impactUsd)) + '</div>') + '</div>' +
          '<p>' + esc(row.finding) + '</p>' +
          '<p class="recommendation-action"><strong>Action:</strong> ' + esc(row.action) + '</p>' +
          '<p class="recommendation-meta">' + esc(row.confidence.toUpperCase()) + ' confidence · ' + esc(row.evidence) + '</p>' +
          '<p class="recommendation-caveat">' + esc(row.caveat) + '</p>' +
        '</article>'
      )).join('');
    }

    function selectedProjectFromSummary(summary) {
      const projects = summary?.projectDaily || [];
      const select = document.getElementById('project-select');
      const index = clamp(Number(select?.value || 0), 0, Math.max(0, projects.length - 1));
      return projects[index] || null;
    }

    function renderProjectSelector(summary) {
      const select = document.getElementById('project-select');
      const projects = summary.projectDaily || [];
      const previousValue = select.value;
      if (!projects.length) {
        select.innerHTML = '<option value="0">No projects</option>';
        select.disabled = true;
        return;
      }
      select.disabled = false;
      select.innerHTML = projects.map((project, index) => {
        const label = projectLabel(project.name) + ' · ' + formatUsdCompact(project.costUsd || 0);
        return '<option value="' + index + '" title="' + esc(project.name) + '">' + esc(label) + '</option>';
      }).join('');
      const previousIndex = Number(previousValue);
      if (Number.isInteger(previousIndex) && projects[previousIndex]) select.value = String(previousIndex);
      else select.value = '0';
    }

    function render(summary) {
      cachedSummary = summary;
      timelineGeneration += 1;
      globalTimelineCache.clear();
      globalTimelineRequests.clear();
      projectTimelineCache.clear();
      projectTimelineRequests.clear();
      if (configurationState && summary.configurationRevision === configurationState.revision && !summary.pricingStale) {
        configurationRequiresSync = false;
      }
      if (configurationState) renderConfigurationStatus();
      const updated = document.getElementById('updated');
      updated.textContent = 'Updated just now';
      updated.title = new Date(summary.generatedAt).toLocaleString();
      const subscription = summary.costSemantics === 'api-equivalent';
      const costLabel = subscription ? 'API Equivalent' : 'API Cost';
      const costMeta = subscription
        ? (summary.usageProfile?.name || 'Subscription') + ' · Standard/custom list prices · Not billed'
        : currentMonthCostMeta(summary.currentMonth);
      document.getElementById('cards').innerHTML = [
        card(costLabel, formatUsdCompact(summary.apiEquivalentCostUsd || 0), '', costMeta),
        card('Requests', formatTokenCount(summary.total.requests || 0)),
        card('Input Tokens', segmentCardText(summary.total, 'input'), 'token-card'),
        card('Cache Tokens', segmentCardText(summary.total, 'cache'), 'token-card'),
        card('Output Tokens', segmentCardText(summary.total, 'output'), 'token-card'),
      ].join('');
      renderSubscriptionWindows(summary);
      for (const range of Object.values(timelineRanges)) {
        range.monthStartAt = summary.currentMonth?.startAt || '';
        range.monthEndAt = summary.currentMonth?.endAt || '';
      }
      renderRecommendations(summary);
      renderTimelineDateControls('token', summary.daily || []);
      renderDailyTokenChart(tokenFlowRows());
      renderModelAnalysis(summary);
      renderProjectSelector(summary);
      renderProjectDailyChart(selectedProjectFromSummary(summary));
      if (dashboardMode !== 'settings') loadGlobalTimelineView();
      if (dashboardMode === 'analyst') loadSelectedProjectTimeline();
    }

    const delay = milliseconds => new Promise(resolve => setTimeout(resolve, milliseconds));
    let syncPollGeneration = 0;
    let syncEventSource = null;
    let syncAvailable = false;

    async function fetchTimeline({ project, days, from, to, fromAt, toAt } = {}) {
      const params = new URLSearchParams();
      if (project) params.set('project', project);
      if (Number.isFinite(days)) params.set('days', String(days));
      if (from) params.set('from', from);
      if (to) params.set('to', to);
      if (fromAt) params.set('fromAt', fromAt);
      if (toAt) params.set('toAt', toAt);
      const response = await fetch('/api/timeline' + (params.size ? '?' + params.toString() : ''), { cache: 'no-store' });
      if (!response.ok) throw new Error('Timeline request failed: HTTP ' + response.status);
      return response.json();
    }

    async function ensureGlobalTimeline() {
      const key = globalTimelineKey();
      if (globalTimelineCache.has(key)) return globalTimelineCache.get(key);
      if (globalTimelineRequests.has(key)) return globalTimelineRequests.get(key);
      const request = fetchTimeline(timelineRangeQuery(timelineRanges.token)).then(rows => {
        return TokenomicsTimeline.rememberBounded(globalTimelineCache, key, rows);
      });
      globalTimelineRequests.set(key, request);
      try {
        return await request;
      } finally {
        if (globalTimelineRequests.get(key) === request) globalTimelineRequests.delete(key);
      }
    }

    async function loadGlobalTimelineView() {
      try {
        await ensureGlobalTimeline();
        if (!cachedSummary) return;
        renderDailyTokenChart(tokenFlowRows());
      } catch (error) {
        console.error(error);
      }
    }

    async function ensureProjectTimeline(project) {
      if (!project) return [];
      const key = projectTimelineKey(project);
      if (projectTimelineCache.has(key)) return projectTimelineCache.get(key);
      if (projectTimelineRequests.has(key)) return projectTimelineRequests.get(key);
      const request = fetchTimeline({ project: project.name, ...timelineRangeQuery(timelineRanges.project) }).then(rows => {
        return TokenomicsTimeline.rememberBounded(projectTimelineCache, key, rows);
      });
      projectTimelineRequests.set(key, request);
      try {
        return await request;
      } finally {
        if (projectTimelineRequests.get(key) === request) projectTimelineRequests.delete(key);
      }
    }

    async function loadSelectedProjectTimeline() {
      const project = selectedProjectFromSummary(cachedSummary);
      if (!project) return;
      const expectedName = project.name;
      const request = ensureProjectTimeline(project);
      renderProjectDailyChart(project);
      try {
        await request;
        const selected = selectedProjectFromSummary(cachedSummary);
        if (selected?.name === expectedName) renderProjectDailyChart(selected);
      } catch (error) {
        console.error(error);
        const selected = selectedProjectFromSummary(cachedSummary);
        if (selected?.name === expectedName) renderProjectDailyChart(selected);
      }
    }

    async function loadSummary() {
      const response = await fetch('/api/summary', { cache: 'no-store' });
      if (!response.ok) throw new Error('Summary request failed: HTTP ' + response.status);
      render(await response.json());
    }

    function renderSyncStatus(sync) {
      const button = document.getElementById('sync-dashboard');
      const dot = document.getElementById('sync-status-dot');
      const updated = document.getElementById('updated');
      const state = sync?.state || 'idle';
      if (typeof sync?.available === 'boolean') syncAvailable = sync.available;
      const running = state === 'running';
      button.disabled = running || !syncAvailable;
      button.textContent = running ? 'Syncing...' : 'Sync';
      dot.classList.toggle('running', running);
      dot.classList.toggle('failed', state === 'failed');
      dot.classList.toggle('unavailable', !syncAvailable);
      if (!syncAvailable) {
        updated.textContent = 'Sync unavailable';
        updated.title = sync?.unavailableReason || 'Sync is disabled for this webserver binding.';
        button.title = updated.title;
      } else if (running) {
        const progress = sync.progress || {};
        const completed = progress.completedSources || 0;
        const candidates = progress.candidateSources;
        const count = Number.isFinite(candidates) ? ' ' + completed + '/' + candidates : '';
        const source = progress.currentSource ? ' · ' + shortSource(progress.currentSource) : '';
        const bytes = progress.bytesProcessed ? ' · ' + formatBytes(progress.bytesProcessed) : '';
        const phase = progress.phase === 'finalizing' ? 'Finalizing' : (progress.phase === 'processing' ? 'Processing' : 'Discovering');
        updated.textContent = phase + count + bytes + source;
        updated.title = sync.startedAt ? 'Started ' + new Date(sync.startedAt).toLocaleString() : '';
      } else if (state === 'failed') {
        updated.textContent = 'Sync failed';
        updated.title = sync.error || 'Unknown sync error';
      } else if (state === 'succeeded') {
        const result = sync.result || {};
        updated.textContent = 'Synced ' + (result.changedSources || 0) + ' changed · ' +
          (result.skippedSources || 0) + ' skipped · ' + formatDuration(result.durationMs || 0);
        updated.title = sync.finishedAt ? new Date(sync.finishedAt).toLocaleString() : '';
      }
    }

    function priceInput(field, value, className = '') {
      const numeric = ['input', 'cacheCreate5m', 'cacheCreate30m', 'cacheCreate1h', 'cacheRead', 'output'].includes(field);
      const type = numeric ? 'number' : 'text';
      const attrs = numeric ? ' min="0" step="any" inputmode="decimal"' : '';
      return '<input class="' + esc(className) + '" data-price-field="' + esc(field) + '" type="' + type + '"' + attrs + ' value="' + esc(value ?? '') + '">';
    }

    function renderConfigurationStatus(message = null, failed = false) {
      const status = document.getElementById('configuration-status');
      if (!status) return;
      status.classList.toggle('stale', configurationRequiresSync || failed);
      if (message) {
        status.textContent = message;
        return;
      }
      if (!configurationState) {
        status.textContent = 'Configuration unavailable';
        return;
      }
      const basis = configurationState.settings.pricingBasis === 'custom' ? 'Custom pricing' : 'Standard API equivalent';
      status.textContent = basis + ' · revision ' + configurationState.revision +
        (configurationRequiresSync ? ' · Sync required to apply changes' : ' · Applied');
    }

    function renderPricingEditor() {
      if (!configurationState) return;
      const usageProfile = configurationState.settings.usageProfile || { id: 'default', name: 'Work API', mode: 'api' };
      document.getElementById('setting-usage-profile-mode').value = usageProfile.mode;
      document.getElementById('setting-usage-profile-name').value = usageProfile.name;
      document.getElementById('setting-openai-context').value = configurationState.settings.openaiContext;
      document.getElementById('setting-pricing-basis').value = configurationState.settings.pricingBasis;
      document.getElementById('setting-regional-multiplier').value = configurationState.settings.regionalMultiplier;
      document.getElementById('setting-monthly-cost-limit').value = configurationState.settings.monthlyCostLimitUsd ?? '';
      updateUsageProfileEditor();
      const table = document.getElementById('pricing-table');
      table.innerHTML =
        '<thead><tr><th>Provider</th><th>Model</th><th>Match</th><th>Variant</th><th>Effective from</th><th>Effective until</th><th>Input</th><th>Cache 5m write</th><th>Cache 30m write</th><th>Cache 1h write</th><th>Cache read</th><th>Output</th><th>Source</th><th></th></tr></thead>' +
        '<tbody>' + configurationState.prices.map((row, index) => (
          '<tr data-price-index="' + index + '">' +
          '<td>' + priceInput('provider', row.provider) + '</td>' +
          '<td>' + priceInput('model', row.model, 'price-model') + '</td>' +
          '<td><select data-price-field="matchMode">' + ['exact', 'prefix', 'snapshot'].map(value => '<option value="' + value + '"' + (row.matchMode === value ? ' selected' : '') + '>' + value + '</option>').join('') + '</select></td>' +
          '<td><select data-price-field="variant">' + ['standard', 'short', 'long'].map(value => '<option value="' + value + '"' + (row.variant === value ? ' selected' : '') + '>' + value + '</option>').join('') + '</select></td>' +
          '<td>' + priceInput('effectiveFrom', row.effectiveFrom) + '</td>' +
          '<td>' + priceInput('effectiveUntil', row.effectiveUntil) + '</td>' +
          '<td>' + priceInput('input', row.input, 'price-number') + '</td>' +
          '<td>' + priceInput('cacheCreate5m', row.cacheCreate5m, 'price-number') + '</td>' +
          '<td>' + priceInput('cacheCreate30m', row.cacheCreate30m, 'price-number') + '</td>' +
          '<td>' + priceInput('cacheCreate1h', row.cacheCreate1h, 'price-number') + '</td>' +
          '<td>' + priceInput('cacheRead', row.cacheRead, 'price-number') + '</td>' +
          '<td>' + priceInput('output', row.output, 'price-number') + '</td>' +
          '<td>' + priceInput('sourceUrl', row.sourceUrl, 'price-source') + '</td>' +
          '<td><button class="icon-button" type="button" data-remove-price="' + index + '" title="Remove price row" aria-label="Remove price row">×</button></td></tr>'
        )).join('') + '</tbody>';
      renderConfigurationStatus();
    }

    function configurationFromEditor() {
      const monthlyCostLimit = document.getElementById('setting-monthly-cost-limit').value.trim();
      const usageProfileMode = document.getElementById('setting-usage-profile-mode').value;
      const prices = [...document.querySelectorAll('#pricing-table tbody tr')].map(row => {
        const result = {};
        row.querySelectorAll('[data-price-field]').forEach(input => {
          const field = input.dataset.priceField;
          const raw = input.value.trim();
          result[field] = ['input', 'cacheCreate5m', 'cacheCreate30m', 'cacheCreate1h', 'cacheRead', 'output'].includes(field)
            ? (raw === '' ? null : Number(raw))
            : (raw === '' ? null : raw);
        });
        return result;
      });
      return {
        revision: configurationState.revision,
        settings: {
          openaiContext: document.getElementById('setting-openai-context').value,
          pricingBasis: document.getElementById('setting-pricing-basis').value,
          regionalMultiplier: Number(document.getElementById('setting-regional-multiplier').value),
          monthlyCostLimitUsd: usageProfileMode === 'api' && monthlyCostLimit !== '' ? Number(monthlyCostLimit) : null,
          usageProfile: {
            id: configurationState.settings.usageProfile?.id || 'default',
            name: document.getElementById('setting-usage-profile-name').value.trim(),
            mode: usageProfileMode,
          },
        },
        prices,
      };
    }

    async function loadConfigurationEditor() {
      const response = await fetch('/api/configuration', { cache: 'no-store' });
      const body = await response.json();
      if (!response.ok) throw new Error(body.error || 'Configuration request failed: HTTP ' + response.status);
      configurationState = body.configuration;
      configurationRequiresSync = Boolean(body.requiresSync);
      renderPricingEditor();
    }

    async function savePricingEditor() {
      const button = document.getElementById('save-pricing');
      button.disabled = true;
      renderConfigurationStatus('Saving configuration...');
      try {
        const response = await fetch('/api/configuration', {
          method: 'PUT',
          headers: { 'content-type': 'application/json', 'x-tokenomics-action': 'configuration' },
          body: JSON.stringify(configurationFromEditor()),
        });
        const body = await response.json();
        if (!response.ok) throw new Error(body.error || 'Configuration save failed: HTTP ' + response.status);
        configurationState = body.configuration;
        configurationRequiresSync = Boolean(body.requiresSync);
        renderPricingEditor();
        await loadSummary();
      } catch (error) {
        renderConfigurationStatus(error.message, true);
        console.error(error);
      } finally {
        button.disabled = false;
      }
    }

    function updateUsageProfileEditor() {
      const subscription = document.getElementById('setting-usage-profile-mode').value === 'subscription';
      const limit = document.getElementById('setting-monthly-cost-limit');
      limit.disabled = subscription;
      if (subscription) limit.value = '';
      document.getElementById('monthly-cost-limit-field').title = subscription
        ? 'Monthly USD budgets apply only to API profiles.'
        : '';
    }

    function shortSource(value) {
      const parts = String(value).split(/[\\/:]/);
      return parts[parts.length - 1] || String(value);
    }

    function formatDuration(milliseconds) {
      if (milliseconds < 1_000) return Math.round(milliseconds) + 'ms';
      if (milliseconds < 60_000) return (milliseconds / 1_000).toFixed(1) + 's';
      return (milliseconds / 60_000).toFixed(1) + 'm';
    }

    function formatBytes(value) {
      const units = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
      let amount = Math.max(0, value || 0);
      let unit = 0;
      while (amount >= 1024 && unit < units.length - 1) {
        amount /= 1024;
        unit += 1;
      }
      return amount.toFixed(unit === 0 ? 0 : 1) + units[unit];
    }

    async function fetchSyncStatus() {
      const response = await fetch('/api/sync', { cache: 'no-store' });
      if (!response.ok) throw new Error('Sync status request failed: HTTP ' + response.status);
      return (await response.json()).sync;
    }

    async function pollSyncStatus() {
      const generation = ++syncPollGeneration;
      let failures = 0;
      while (generation === syncPollGeneration) {
        await delay(700);
        try {
          const sync = await fetchSyncStatus();
          failures = 0;
          renderSyncStatus(sync);
          if (sync.state !== 'running') {
            if (sync.state === 'succeeded') {
              await loadSummary();
              renderSyncStatus(sync);
            }
            return;
          }
        } catch (error) {
          failures += 1;
          if (failures >= 5) {
            const button = document.getElementById('sync-dashboard');
            button.disabled = false;
            button.textContent = 'Sync';
            document.getElementById('updated').textContent = 'Sync status unavailable';
            document.getElementById('updated').title = error.message;
            console.error(error);
            return;
          }
        }
      }
    }

    function closeSyncEventSource() {
      if (!syncEventSource) return;
      syncEventSource.close();
      syncEventSource = null;
    }

    function watchSyncStatus() {
      syncPollGeneration += 1;
      closeSyncEventSource();
      if (typeof EventSource !== 'function') {
        pollSyncStatus();
        return;
      }
      const generation = syncPollGeneration;
      const events = new EventSource('/api/sync/events');
      syncEventSource = events;
      events.onmessage = async event => {
        if (generation !== syncPollGeneration) return;
        try {
          const sync = JSON.parse(event.data).sync;
          renderSyncStatus(sync);
          if (sync.state !== 'running') {
            closeSyncEventSource();
            if (sync.state === 'succeeded') {
              await loadSummary();
              renderSyncStatus(sync);
            }
          }
        } catch (error) {
          console.error(error);
        }
      };
      events.onerror = () => {
        if (generation !== syncPollGeneration) return;
        closeSyncEventSource();
        pollSyncStatus();
      };
    }

    async function startSync() {
      syncPollGeneration += 1;
      closeSyncEventSource();
      renderSyncStatus({ state: 'running', available: syncAvailable, startedAt: new Date().toISOString() });
      try {
        const response = await fetch('/api/sync', {
          method: 'POST',
          headers: { 'x-tokenomics-action': 'sync' },
        });
        const body = await response.json();
        if (!response.ok) throw new Error(body.error || 'Sync request failed: HTTP ' + response.status);
        renderSyncStatus(body.sync);
        if (body.sync.state === 'running') watchSyncStatus();
        else if (body.sync.state === 'succeeded') {
          await loadSummary();
          renderSyncStatus(body.sync);
        }
      } catch (error) {
        renderSyncStatus({ state: 'failed', available: syncAvailable, error: error.message });
        console.error(error);
      }
    }

    async function initializeDashboard() {
      const [, sync] = await Promise.all([loadSummary(), fetchSyncStatus(), loadConfigurationEditor()]);
      renderSyncStatus(sync);
      if (sync.state === 'running') watchSyncStatus();
    }

    function applyTimelineRangeChange(kind) {
      if (!cachedSummary) return;
      const project = selectedProjectFromSummary(cachedSummary);
      if (kind === 'token') {
        resetSharedChartDomain(dailyTokenChart);
        renderTimelineDateControls('token', cachedSummary.daily || []);
        renderDailyTokenChart(tokenFlowRows());
        loadGlobalTimelineView();
      } else {
        resetSharedChartDomain(projectChart);
        renderTimelineDateControls('project', project?.daily || []);
        renderProjectDailyChart(project);
        loadSelectedProjectTimeline();
      }
    }

    function bindTimelineDateControls(kind) {
      const range = timelineRanges[kind];
      document.getElementById(kind + '-date-mode-controls').addEventListener('click', event => {
        const mode = event.target?.dataset?.timelineDateMode;
        if (!['relative', 'absolute'].includes(mode) || mode === range.mode) return;
        range.mode = mode;
        applyTimelineRangeChange(kind);
      });
      document.getElementById(kind + '-relative-range').addEventListener('change', event => {
        range.calendarMonth = event.target.value === 'month';
        if (!range.calendarMonth) range.days = event.target.value === 'all' ? Infinity : Number(event.target.value);
        applyTimelineRangeChange(kind);
      });
      document.getElementById(kind + '-date-from').addEventListener('change', event => {
        range.from = event.target.value;
        if (range.to && range.from > range.to) range.to = range.from;
        applyTimelineRangeChange(kind);
      });
      document.getElementById(kind + '-date-to').addEventListener('change', event => {
        range.to = event.target.value;
        if (range.from && range.to < range.from) range.from = range.to;
        applyTimelineRangeChange(kind);
      });
    }

    function bindChartInteractionControls(kind, chart) {
      const controls = document.getElementById(kind + '-interaction-controls');
      controls.addEventListener('click', event => {
        const interaction = event.target?.dataset?.chartInteraction;
        if (!['pan', 'zoom'].includes(interaction) || interaction === chart.interaction) return;
        chart.interaction = interaction;
        chart.dragStartX = null;
        chart.dragCurrentX = null;
        chart.dragDomain = null;
        controls.querySelectorAll('[data-chart-interaction]').forEach(button => {
          const active = button.dataset.chartInteraction === interaction;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', String(active));
        });
        rerenderSharedMixChart(chart);
      });
    }

    bindTimelineDateControls('token');
    bindTimelineDateControls('project');
    bindChartInteractionControls('token', dailyTokenChart);
    bindChartInteractionControls('project', projectChart);
    document.getElementById('model-date-mode-controls').addEventListener('click', event => {
      const mode = event.target?.dataset?.modelDateMode;
      if (!['relative', 'absolute'].includes(mode) || mode === modelDateMode) return;
      modelDateMode = mode;
      if (cachedSummary) renderModelAnalysis(cachedSummary);
    });
    document.getElementById('model-relative-range').addEventListener('change', event => {
      modelRelativeDays = event.target.value === 'month'
        ? 'month'
        : (event.target.value === 'all' ? Infinity : Number(event.target.value));
      if (cachedSummary) renderModelAnalysis(cachedSummary);
    });
    document.getElementById('model-date-from').addEventListener('change', event => {
      const to = document.getElementById('model-date-to');
      if (to.value && event.target.value > to.value) to.value = event.target.value;
      if (cachedSummary) renderModelAnalysis(cachedSummary);
    });
    document.getElementById('model-date-to').addEventListener('change', event => {
      const from = document.getElementById('model-date-from');
      if (from.value && event.target.value < from.value) from.value = event.target.value;
      if (cachedSummary) renderModelAnalysis(cachedSummary);
    });
    document.getElementById('efficiency-model-select').addEventListener('change', event => {
      efficiencyModelKey = event.target.value || null;
      if (cachedSummary) renderEfficiency(cachedSummary);
    });
    document.getElementById('sync-dashboard').addEventListener('click', () => {
      startSync();
    });
    document.getElementById('save-pricing').addEventListener('click', () => {
      savePricingEditor();
    });
    document.getElementById('setting-usage-profile-mode').addEventListener('change', updateUsageProfileEditor);
    document.getElementById('add-price').addEventListener('click', () => {
      if (!configurationState) return;
      configurationState = configurationFromEditor();
      configurationState.settings.pricingBasis = 'custom';
      configurationState.prices.push({
        provider: 'new-provider',
        model: 'new-model',
        matchMode: 'exact',
        variant: 'standard',
        effectiveFrom: null,
        effectiveUntil: null,
        input: 0,
        cacheCreate5m: null,
        cacheCreate30m: null,
        cacheCreate1h: null,
        cacheRead: null,
        output: 0,
        sourceUrl: '',
      });
      renderPricingEditor();
      document.querySelector('#pricing-table tbody tr:last-child')?.scrollIntoView({ block: 'nearest' });
    });
    document.getElementById('pricing-table').addEventListener('click', event => {
      const index = Number(event.target?.dataset?.removePrice);
      if (!Number.isInteger(index) || !configurationState) return;
      configurationState = configurationFromEditor();
      configurationState.prices.splice(index, 1);
      renderPricingEditor();
    });
    document.getElementById('dashboard-mode-controls').addEventListener('click', event => {
      const mode = event.target?.dataset?.dashboardMode;
      if (!['overview', 'analyst', 'settings'].includes(mode) || mode === dashboardMode) return;
      dashboardMode = mode;
      applyDashboardMode();
    });
    document.getElementById('token-value-controls').addEventListener('click', event => {
      const mode = event.target?.dataset?.tokenFlowValue;
      if (!['tokens', 'cost'].includes(mode) || mode === tokenFlowValueMode) return;
      tokenFlowValueMode = mode;
      applyTokenFlowValueMode();
    });
    let activeSectionTarget = 'overview-section';
    function syncSectionNav() {
      const threshold = document.getElementById('app-header').getBoundingClientRect().height + 24;
      if (dashboardMode === 'settings') return;
      const orderedTargets = ['overview-section', 'projects-section', 'models-section', 'efficiency-section'];
      if (window.scrollY < 80) {
        activeSectionTarget = 'overview-section';
      } else {
        for (const targetId of orderedTargets) {
          const section = document.getElementById(targetId);
          if (section && getComputedStyle(section).display !== 'none' && section.getBoundingClientRect().top <= threshold) {
            activeSectionTarget = targetId;
          }
        }
      }
      document.querySelectorAll('#section-nav [data-section-target]').forEach(button => {
        button.classList.toggle('active', button.dataset.sectionTarget === activeSectionTarget);
      });
    }
    document.getElementById('section-nav').addEventListener('click', event => {
      const targetId = event.target?.dataset?.sectionTarget;
      if (!targetId) return;
      activeSectionTarget = targetId;
      syncSectionNav();
      document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    window.addEventListener('scroll', syncSectionNav, { passive: true });
    document.getElementById('project-select').addEventListener('change', () => {
      projectChart.selectedProjectName = null;
      resetSharedChartDomain(projectChart);
      if (cachedSummary) {
        renderProjectDailyChart(selectedProjectFromSummary(cachedSummary));
        loadSelectedProjectTimeline();
      }
    });
    bindSharedMixCanvas(dailyTokenChart);
    bindSharedMixCanvas(projectChart);
    new ResizeObserver(() => { if (cachedSummary) renderDailyTokenChart(tokenFlowRows()); }).observe(document.getElementById('daily-token-canvas'));
    new ResizeObserver(() => { if (cachedSummary) renderProjectDailyChart(selectedProjectFromSummary(cachedSummary)); }).observe(document.getElementById('project-cost-canvas'));
    applyDashboardMode({ persist: false });
    applyTokenFlowValueMode({ persist: false });
    initializeDashboard().catch(error => { document.body.innerHTML = '<main><section><h2>Failed to load dashboard</h2><pre>' + esc(error.stack || error.message) + '</pre></section></main>'; });
  </script>
</body>
