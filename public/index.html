 <!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokenomics Viewer</title>
  <style>
    :root { color-scheme: light dark; --bg:#f8f9f8; --fg:#202124; --muted:#687076; --line:#dfe2df; --panel:#ffffff; --accent:#2563eb; --cache:#0f9f6e; --out:#c2410c; --warn:#b45309; --axis:#8b949e; --grid:rgba(104,112,118,.18); --soft:rgba(104,112,118,.07); }
    @media (prefers-color-scheme: dark) { :root { --bg:#111315; --fg:#f2f2ef; --muted:#a6adb4; --line:#30343a; --panel:#181b1f; --accent:#6ea8fe; --cache:#39d39f; --out:#ff9a62; --warn:#f5c36b; --axis:#89929b; --grid:rgba(166,173,180,.18); --soft:rgba(166,173,180,.08); } }
    * { box-sizing: border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow-x:hidden; }
    button, select { font:inherit; }
    .app-header { position:sticky; top:0; z-index:5; background:color-mix(in srgb, var(--panel) 96%, transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .brand-row { min-height:50px; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:8px 20px; }
    .brand-group, .header-actions, .sync-state { display:flex; align-items:center; gap:10px; }
    .brand-group { min-width:0; }
    .header-actions { flex-shrink:0; }
    .sync-state { min-width:0; max-width:min(70vw, 780px); color:var(--muted); font-size:12px; }
    #updated { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:var(--cache); box-shadow:0 0 0 3px color-mix(in srgb, var(--cache) 15%, transparent); }
    .status-dot.running { background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); animation:sync-pulse 1.4s ease-in-out infinite; }
    .status-dot.failed { background:var(--out); box-shadow:0 0 0 3px color-mix(in srgb, var(--out) 15%, transparent); }
    .status-dot.unavailable { background:var(--axis); box-shadow:none; }
    @keyframes sync-pulse { 50% { opacity:.35; } }
    @media (prefers-reduced-motion: reduce) { .status-dot.running { animation:none; } }
    h1 { margin:0; font-size:18px; letter-spacing:0; }
    .action-button { min-height:32px; border:1px solid var(--line); border-radius:6px; padding:5px 10px; color:var(--fg); background:var(--panel); cursor:pointer; }
    .action-button:hover { border-color:var(--axis); background:var(--soft); }
    .action-button:focus-visible, .seg-button:focus-visible, .nav-button:focus-visible, select:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .action-button:disabled { cursor:not-allowed; color:var(--muted); }
    .section-nav { display:flex; gap:24px; min-height:38px; padding:0 20px; overflow:auto; }
    .nav-button { position:relative; border:0; background:transparent; color:var(--muted); padding:8px 0 9px; cursor:pointer; white-space:nowrap; }
    .nav-button.active { color:var(--accent); font-weight:650; }
    .nav-button.active::after { content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--accent); }
    main { padding:16px 20px 28px; display:grid; gap:14px; max-width:1600px; margin:0 auto; }
    section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; min-width:0; scroll-margin-top:104px; }
    .kpi-band { padding:0; }
    .cards { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); }
    .card { min-width:0; padding:14px 16px; border-right:1px solid var(--line); }
    .card:last-child { border-right:0; }
    .label { color:var(--muted); font-size:12px; }
    .value { font-size:22px; font-weight:700; margin-top:3px; overflow-wrap:anywhere; font-variant-numeric:tabular-nums; }
    .token-card .value { font-size:16px; white-space:nowrap; }
    .analysis-grid { display:grid; grid-template-columns:minmax(360px, .9fr) minmax(0, 1.35fr); gap:14px; align-items:stretch; }
    .panel-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .panel-title-stack { display:grid; gap:6px; min-width:0; }
    h2 { margin:0; font-size:16px; }
    .control-select { max-width:min(420px, 100%); min-width:220px; border:1px solid var(--line); border-radius:6px; background:var(--panel); color:var(--fg); padding:6px 28px 6px 8px; }
    .segmented { display:inline-flex; align-items:center; gap:2px; border:1px solid var(--line); border-radius:6px; padding:2px; background:var(--soft); }
    .seg-button { border:0; border-radius:4px; background:transparent; color:var(--muted); padding:5px 8px; font:inherit; font-size:12px; cursor:pointer; }
    .seg-button.active { background:var(--panel); color:var(--fg); box-shadow:0 0 0 1px var(--line); }
    .swatch { width:10px; height:10px; border-radius:999px; display:inline-block; }
    .chart-wrap { position:relative; min-height:390px; }
    .compact-chart-wrap, .project-chart-wrap { position:relative; min-height:330px; }
    .mix-canvas { width:100%; height:390px; display:block; cursor:crosshair; touch-action:none; }
    .compact-canvas { height:330px; }
    .range-row { display:flex; justify-content:flex-end; margin-top:-4px; }
    .model-ranking { min-height:330px; }
    .model-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .model-table th, .model-table td { padding:7px 6px; }
    .model-table th:first-child, .model-table td:first-child { width:38%; }
    .model-table .model-name { overflow:hidden; text-overflow:ellipsis; }
    .rank-bar-track { height:6px; background:var(--soft); }
    .rank-bar { display:block; height:100%; background:var(--axis); }
    .is-hidden { display:none !important; }
    #efficiency-table { width:100%; border-collapse:collapse; min-width:920px; }
    th, td { padding:8px 10px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
    th:first-child, td:first-child { text-align:left; }
    th { color:var(--muted); font-weight:600; font-size:12px; }
    td:first-child { max-width:520px; overflow:hidden; text-overflow:ellipsis; }
    .table-scroll { overflow:auto; max-width:100%; }
    .seg-input { background:var(--accent); }
    .seg-cache { background:var(--cache); }
    .seg-output { background:var(--out); }
    .hover-legend { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px; min-height:24px; color:var(--muted); font-size:12px; }
    .hover-legend strong { color:var(--fg); font-weight:650; max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mix-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 7px; border:1px solid var(--line); border-radius:999px; background:var(--soft); white-space:nowrap; }
    .muted { color:var(--muted); }
    .recommendation-list { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); border-top:1px solid var(--line); }
    .recommendation-item { min-width:0; padding:14px 16px; border-bottom:1px solid var(--line); }
    .recommendation-item:nth-child(odd) { border-right:1px solid var(--line); }
    .recommendation-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .recommendation-title { font-weight:700; }
    .recommendation-impact { color:var(--out); font-weight:700; white-space:nowrap; }
    .recommendation-item p { margin:8px 0 0; }
    .recommendation-action { color:var(--fg); }
    .recommendation-meta, .recommendation-caveat { color:var(--muted); font-size:12px; }
    body[data-dashboard-mode="overview"] .analyst-only { display:none !important; }
    body[data-dashboard-mode="overview"] .analysis-grid { grid-template-columns:1fr; }
    @media (max-width: 1180px) { .cards { grid-template-columns:repeat(3, minmax(0, 1fr)); } .card:nth-child(3) { border-right:0; } .card:nth-child(n+4) { border-top:1px solid var(--line); } .analysis-grid { grid-template-columns:1fr; } }
    @media (max-width: 760px) { .cards { grid-template-columns:repeat(2, minmax(0, 1fr)); } .card, .card:nth-child(3) { border-right:1px solid var(--line); border-top:1px solid var(--line); } .card:nth-child(-n+2) { border-top:0; } .card:nth-child(2n) { border-right:0; } .card:last-child { grid-column:1 / -1; border-right:0; } .panel-head { display:grid; } .hover-legend { justify-content:flex-start; } .recommendation-list { grid-template-columns:1fr; } .recommendation-item:nth-child(odd) { border-right:0; } }
    @media (max-width: 560px) { .brand-row { align-items:flex-start; } .brand-group { align-items:flex-start; flex-direction:column; gap:3px; } .sync-state { max-width:110px; } .section-nav { gap:18px; } main { padding:12px; } .cards { grid-template-columns:1fr; } .card, .card:nth-child(3), .card:nth-child(2n) { border-right:0; border-top:1px solid var(--line); } .card:first-child { border-top:0; } .card:last-child { grid-column:auto; } .token-card .value { white-space:normal; } .chart-wrap, .compact-chart-wrap, .project-chart-wrap { min-height:330px; } .mix-canvas { height:330px; } .range-row { justify-content:flex-start; overflow:auto; } }
    @media (max-width: 360px) { .brand-row { flex-wrap:wrap; } .header-actions { width:100%; justify-content:space-between; } }
  </style>
</head>
<body data-dashboard-mode="overview">
  <header class="app-header" id="app-header">
    <div class="brand-row">
      <div class="brand-group">
        <h1>Tokenomics</h1>
        <div class="sync-state" role="status" aria-live="polite"><span class="status-dot" id="sync-status-dot"></span><span id="updated">Loading...</span></div>
      </div>
      <div class="header-actions">
        <div class="segmented" id="dashboard-mode-controls" aria-label="Dashboard mode">
          <button class="seg-button active" type="button" data-dashboard-mode="overview" aria-pressed="true">Overview</button>
          <button class="seg-button" type="button" data-dashboard-mode="analyst" aria-pressed="false">Analyst</button>
        </div>
        <button class="action-button" id="sync-dashboard" type="button" title="Scan logs and update the database" disabled>Sync</button>
      </div>
    </div>
    <nav class="section-nav" id="section-nav" aria-label="Dashboard sections">
      <button class="nav-button active" type="button" data-section-target="overview-section">Summary</button>
      <button class="nav-button analyst-only" type="button" data-section-target="projects-section">Projects</button>
      <button class="nav-button" type="button" data-section-target="models-section">Models</button>
      <button class="nav-button analyst-only" type="button" data-section-target="efficiency-section">Efficiency</button>
    </nav>
  </header>
  <main>
    <section class="kpi-band" id="overview-section"><div class="cards" id="cards"></div></section>
    <section id="recommendations-section">
      <div class="panel-head"><h2>Recommended Actions</h2><div class="muted" id="recommendations-summary"></div></div>
      <div class="recommendation-list" id="recommendations-list"></div>
    </section>
    <section>
      <div class="panel-head">
        <div class="panel-title-stack">
          <h2>Daily Token Flow</h2>
          <div class="hover-legend" id="daily-token-hover-legend"></div>
        </div>
      </div>
      <div class="chart-wrap"><canvas class="mix-canvas" id="daily-token-canvas" role="img" aria-label="Daily input, cache, and output token mix"></canvas></div>
      <div class="range-row">
        <div class="segmented" id="daily-range-controls" aria-label="Daily chart range">
          <button class="seg-button" type="button" data-range-days="30">1M</button>
          <button class="seg-button active" type="button" data-range-days="90">3M</button>
          <button class="seg-button" type="button" data-range-days="180">6M</button>
          <button class="seg-button" type="button" data-range-days="365">1Y</button>
          <button class="seg-button" type="button" data-range-days="all">All</button>
        </div>
      </div>
    </section>
    <div class="analysis-grid">
      <section id="models-section">
        <div class="panel-head">
          <div class="panel-title-stack">
            <h2 id="cost-mix-title">Cost by Model</h2>
            <div class="hover-legend" id="cost-mix-hover-legend"></div>
          </div>
          <div class="segmented" id="cost-mix-controls" aria-label="Cost mix period">
            <button class="seg-button" type="button" data-mix-mode="daily">Daily</button>
            <button class="seg-button" type="button" data-mix-mode="weekly">Weekly</button>
            <button class="seg-button" type="button" data-mix-mode="monthly">Monthly</button>
            <button class="seg-button" type="button" data-mix-mode="models">Models</button>
          </div>
        </div>
        <div class="model-ranking" id="model-ranking"></div>
        <div class="compact-chart-wrap is-hidden" id="cost-chart-wrap"><canvas class="mix-canvas compact-canvas" id="cost-mix-canvas" role="img" aria-label="Cost mix by selected period"></canvas></div>
      </section>
      <section class="analyst-only" id="projects-section">
        <div class="panel-head">
          <div class="panel-title-stack">
            <h2>Project Daily Cost</h2>
            <select class="control-select" id="project-select" aria-label="Project"></select>
          </div>
          <div class="hover-legend" id="project-hover-legend"></div>
        </div>
        <div class="project-chart-wrap"><canvas class="mix-canvas compact-canvas" id="project-cost-canvas" role="img" aria-label="Daily project cost with input, cache, and output cost mix"></canvas></div>
      </section>
    </div>
    <section class="analyst-only" id="efficiency-section">
      <div class="panel-head">
        <h2>Efficiency</h2>
      </div>
      <div class="table-scroll">
        <table id="efficiency-table"></table>
      </div>
    </section>
  </main>
  <script>
    const usd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 });
    const compact = new Intl.NumberFormat('en-US', { notation: 'compact', compactDisplay: 'short', maximumFractionDigits: 1 });
    const compactUsd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', notation: 'compact', compactDisplay: 'short', maximumFractionDigits: 1 });
    const colors = {
      input: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
      cache: getComputedStyle(document.documentElement).getPropertyValue('--cache').trim(),
      output: getComputedStyle(document.documentElement).getPropertyValue('--out').trim(),
      fg: getComputedStyle(document.documentElement).getPropertyValue('--fg').trim(),
      muted: getComputedStyle(document.documentElement).getPropertyValue('--muted').trim(),
      panel: getComputedStyle(document.documentElement).getPropertyValue('--panel').trim(),
      line: getComputedStyle(document.documentElement).getPropertyValue('--line').trim(),
      grid: getComputedStyle(document.documentElement).getPropertyValue('--grid').trim(),
      axis: getComputedStyle(document.documentElement).getPropertyValue('--axis').trim(),
    };
    const pct = (part, total) => total > 0 ? Math.max(0, (part / total) * 100) : 0;
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

    function tokenCache(row) {
      return (row.cacheRead || 0) + (row.cacheCreate5m || 0) + (row.cacheCreate30m || 0) + (row.cacheCreate1h || 0);
    }

    function formatTokenCount(value) {
      return compact.format(value || 0);
    }

    function formatUsdCompact(value) {
      return Math.abs(value || 0) >= 1_000 ? compactUsd.format(value || 0) : usd.format(value || 0);
    }

    function card(label, value, className = '') {
      return '<div class="card ' + esc(className) + '"><div class="label">' + esc(label) + '</div><div class="value">' + esc(value) + '</div></div>';
    }

    function costMix(stats = {}) {
      const costs = stats.costsUsd || {};
      const input = costs.input || 0;
      const cache = (costs.cacheRead || 0) + (costs.cacheCreate5m || 0) + (costs.cacheCreate30m || 0) + (costs.cacheCreate1h || 0);
      const output = costs.output || 0;
      const total = input + cache + output;
      return {
        input,
        cache,
        output,
        total,
        inputPct: total > 0 ? input / total : 0,
        cachePct: total > 0 ? cache / total : 0,
        outputPct: total > 0 ? output / total : 0,
      };
    }

    function formatPct(value) {
      return Number.isFinite(value) ? (value * 100).toFixed(1) + '%' : '0.0%';
    }

    function segmentCost(row = {}, key) {
      const costs = row.costsUsd || {};
      if (key === 'cache') return (costs.cacheRead || 0) + (costs.cacheCreate5m || 0) + (costs.cacheCreate30m || 0) + (costs.cacheCreate1h || 0);
      return costs[key] || 0;
    }

    function segmentTokens(row = {}, key) {
      if (key === 'cache') return tokenCache(row);
      return row[key] || 0;
    }

    function segmentShareText(row, segment, mix) {
      const share = mix[segment.pctKey] || 0;
      return formatTokenCount(segmentTokens(row, segment.key)) + ' tokens / ' +
        formatUsdCompact(segmentCost(row, segment.key)) + ' / ' +
        formatPct(share);
    }

    function segmentCardText(row, key) {
      const mix = costMix(row);
      const share = mix[key + 'Pct'] || 0;
      return formatTokenCount(segmentTokens(row, key)) + ' / ' +
        formatUsdCompact(segmentCost(row, key)) + ' / ' +
        formatPct(share);
    }

    function totalTokens(row = {}) {
      return (row.input || 0) + tokenCache(row) + (row.output || 0);
    }

    function pricedTokenCache(row = {}) {
      return (row.pricedCacheRead || 0) + (row.pricedCacheCreate5m || 0) + (row.pricedCacheCreate30m || 0) + (row.pricedCacheCreate1h || 0);
    }

    function pricedOutputTokens(row = {}) {
      if (row.pricedOutput > 0) return row.pricedOutput;
      if (row.pricedRequests > 0 && row.pricedRequests === row.requests) return row.output || 0;
      return 0;
    }

    function pricedTotalTokens(row = {}) {
      const explicit = (row.pricedInput || 0) + pricedTokenCache(row) + (row.pricedOutput || 0);
      if (explicit > 0) return explicit;
      if (row.pricedRequests > 0 && row.pricedRequests === row.requests) return totalTokens(row);
      return 0;
    }

    function pricedCost(row = {}) {
      return row.pricedRequests > 0 ? (row.costUsd || 0) : null;
    }

    function outputCharsPerTokenAvg(row = {}) {
      return row.outputCharTokenSamples > 0 ? (row.outputCharsPerTokenSum || 0) / row.outputCharTokenSamples : 0;
    }

    function formatDecimal(value, digits = 2) {
      return Number.isFinite(value) ? value.toFixed(digits) : '-';
    }

    function formatCharTokenRange(row = {}) {
      if (!row.outputCharTokenSamples) return '-';
      return [
        row.outputCharsPerTokenP10 ?? row.outputCharsPerTokenMin,
        outputCharsPerTokenAvg(row),
        row.outputCharsPerTokenP99 ?? row.outputCharsPerTokenMax,
      ].map(value => formatDecimal(value, 2)).join(' / ');
    }

    function totalCostPerMillionOutput(row = {}) {
      const output = pricedOutputTokens(row);
      return output > 0 ? ((row.costUsd || 0) / output) * 1_000_000 : null;
    }

    function outputCostPerMillionOutput(row = {}) {
      const output = pricedOutputTokens(row);
      return output > 0 ? (segmentCost(row, 'output') / output) * 1_000_000 : null;
    }

    function avgPricedCost(row = {}) {
      return row.pricedRequests > 0 ? (row.costUsd || 0) / row.pricedRequests : null;
    }

    function formatNullableUsd(value) {
      return Number.isFinite(value) ? usd.format(value) : 'n/a';
    }

    function formatRatio(part, total) {
      return total > 0 ? formatPct(part / total) : 'n/a';
    }

    function pricedShare(row = {}) {
      return row.requests > 0 ? (row.pricedRequests || 0) / row.requests : 0;
    }

    function tokenMix(row = {}) {
      const input = row.input || 0;
      const cache = tokenCache(row);
      const output = row.output || 0;
      const total = input + cache + output;
      return {
        input,
        cache,
        output,
        total,
        inputPct: total > 0 ? input / total : 0,
        cachePct: total > 0 ? cache / total : 0,
        outputPct: total > 0 ? output / total : 0,
      };
    }

    function tickIndexes(count, target) {
      if (count <= 1) return [0];
      const steps = Math.min(target, count - 1);
      const seen = new Set();
      for (let i = 0; i <= steps; i += 1) seen.add(Math.round((i * (count - 1)) / steps));
      return [...seen].sort((a, b) => a - b);
    }

    function tokenScale(value) {
      return Math.log10(Math.max(0, value) + 1);
    }

    function moneyScale(value) {
      return Math.log10(Math.max(0, value) + 1);
    }

    function projectLabel(name) {
      const text = String(name || '(unknown project)');
      const parts = text.split('/').filter(Boolean);
      return parts.at(-1) || text;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function sizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width || 1));
      const height = Math.max(320, Math.floor(rect.height || 390));
      const dpr = window.devicePixelRatio || 1;
      if (canvas.width !== Math.floor(width * dpr) || canvas.height !== Math.floor(height * dpr)) {
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width, height };
    }

    function drawCanvasCatmullRom(ctx, points, tension = 1) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 0; i < points.length - 1; i += 1) {
        const p0 = points[i - 1] || points[i];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2] || p2;
        const cp1x = p1.x + ((p2.x - p0.x) / 6) * tension;
        const cp1y = p1.y + ((p2.y - p0.y) / 6) * tension;
        const cp2x = p2.x - ((p3.x - p1.x) / 6) * tension;
        const cp2y = p2.y - ((p3.y - p1.y) / 6) * tension;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
      }
    }

    const projectChart = {
      canvasId: 'project-cost-canvas',
      legendId: 'project-hover-legend',
      rows: [],
      selectedProject: null,
      selectedProjectName: null,
      nodes: [],
      hoverIndex: null,
      pinnedIndex: null,
      dragStartX: null,
      dragCurrentX: null,
      plot: null,
      zoom: { start: 0, end: 0 },
      dataKey: null,
      config: null,
    };
    function createSharedMixChart(canvasId, legendId) {
      return {
        canvasId,
        legendId,
        rows: [],
        nodes: [],
        zoom: { start: 0, end: 0 },
        hoverIndex: null,
        dragStartX: null,
        dragCurrentX: null,
        plot: null,
        dataKey: null,
        config: null,
      };
    }

    const dailyTokenChart = createSharedMixChart('daily-token-canvas', 'daily-token-hover-legend');
    const costChart = createSharedMixChart('cost-mix-canvas', 'cost-mix-hover-legend');
    const sharedMixSegments = [
      { key: 'input', pctKey: 'inputPct', label: 'In', color: () => colors.input },
      { key: 'cache', pctKey: 'cachePct', label: 'Cache', color: () => colors.cache },
      { key: 'output', pctKey: 'outputPct', label: 'Out', color: () => colors.output },
    ];

    function sharedMixKey(rows, config) {
      return config.key + '|' + rows.map(row => row.name).join('\\u0000');
    }

    function visibleSharedRange(chart) {
      const count = chart.rows.length;
      if (count === 0) return { start: 0, end: -1 };
      return {
        start: clamp(chart.zoom.start, 0, count - 1),
        end: clamp(chart.zoom.end, 0, count - 1),
      };
    }

    function rerenderSharedMixChart(chart) {
      if (chart.config) renderSharedMixChart(chart, chart.rows, chart.config);
    }

    function applySharedZoom(chart, start, end) {
      const count = chart.rows.length;
      if (count === 0) return;
      let nextStart = Math.round(Math.min(start, end));
      let nextEnd = Math.round(Math.max(start, end));
      const minWindow = Math.min(3, count);
      if (nextEnd - nextStart + 1 < minWindow) {
        const center = (nextStart + nextEnd) / 2;
        nextStart = Math.round(center - (minWindow - 1) / 2);
        nextEnd = nextStart + minWindow - 1;
      }
      if (nextStart < 0) {
        nextEnd -= nextStart;
        nextStart = 0;
      }
      if (nextEnd >= count) {
        nextStart -= nextEnd - count + 1;
        nextEnd = count - 1;
      }
      chart.zoom.start = clamp(nextStart, 0, count - 1);
      chart.zoom.end = clamp(nextEnd, chart.zoom.start, count - 1);
      rerenderSharedMixChart(chart);
    }

    function zoomSharedChartAt(chart, canvasX, direction) {
      const count = chart.rows.length;
      if (count <= 1 || !chart.plot) return;
      const range = visibleSharedRange(chart);
      const currentLength = range.end - range.start + 1;
      const factor = direction < 0 ? 0.72 : 1.38;
      let nextLength = clamp(Math.round(currentLength * factor), Math.min(3, count), count);
      if (nextLength === currentLength) nextLength = clamp(currentLength + (direction < 0 ? -1 : 1), Math.min(3, count), count);
      const ratio = clamp((canvasX - chart.plot.left) / chart.plot.width, 0, 1);
      const anchor = range.start + ratio * (currentLength - 1);
      const nextStart = Math.round(anchor - ratio * (nextLength - 1));
      applySharedZoom(chart, nextStart, nextStart + nextLength - 1);
    }

    function sharedIndexFromX(chart, canvasX) {
      const range = visibleSharedRange(chart);
      if (!chart.plot || range.end < range.start) return 0;
      const count = range.end - range.start + 1;
      if (count <= 1) return range.start;
      const ratio = clamp((canvasX - chart.plot.left) / chart.plot.width, 0, 1);
      return clamp(Math.round(range.start + ratio * (count - 1)), range.start, range.end);
    }

    function drawSharedSelection(ctx, chart) {
      if (chart.dragStartX == null || chart.dragCurrentX == null || !chart.plot) return;
      const x1 = clamp(chart.dragStartX, chart.plot.left, chart.plot.left + chart.plot.width);
      const x2 = clamp(chart.dragCurrentX, chart.plot.left, chart.plot.left + chart.plot.width);
      const left = Math.min(x1, x2);
      const width = Math.abs(x2 - x1);
      if (width < 2) return;
      ctx.save();
      ctx.fillStyle = 'rgba(37, 99, 235, .14)';
      ctx.strokeStyle = colors.accent;
      ctx.lineWidth = 1;
      ctx.fillRect(left, chart.plot.top, width, chart.plot.height);
      ctx.strokeRect(left, chart.plot.top, width, chart.plot.height);
      ctx.restore();
    }

    function drawSharedPinnedMarker(ctx, node) {
      ctx.save();
      ctx.strokeStyle = colors.muted;
      ctx.fillStyle = colors.panel;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(node.x, node.y - 8);
      ctx.lineTo(node.x, node.y - 15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(node.x, node.y - 21);
      ctx.lineTo(node.x + 4, node.y - 17);
      ctx.lineTo(node.x, node.y - 13);
      ctx.lineTo(node.x - 4, node.y - 17);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawSharedHoverGuide(ctx, node, plot, label) {
      const text = label.length > 20 ? label.slice(0, 19) + '…' : label;
      ctx.save();
      ctx.strokeStyle = colors.accent;
      ctx.globalAlpha = .38;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.moveTo(node.x, plot.top);
      ctx.lineTo(node.x, plot.top + plot.height);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      ctx.font = '600 11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      const chipWidth = Math.min(plot.width, ctx.measureText(text).width + 16);
      const chipX = clamp(node.x - chipWidth / 2, plot.left, plot.left + plot.width - chipWidth);
      const chipY = plot.top + plot.height + 36;
      ctx.fillStyle = colors.fg;
      ctx.beginPath();
      ctx.roundRect(chipX, chipY, chipWidth, 22, 4);
      ctx.fill();
      ctx.fillStyle = colors.panel;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, chipX + chipWidth / 2, chipY + 11);
      ctx.restore();
    }

    function drawSharedPoint(ctx, node, { hovered = false, pinned = false } = {}) {
      ctx.save();
      if (hovered) {
        ctx.globalAlpha = .16;
        ctx.fillStyle = colors.accent;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = hovered ? colors.accent : (pinned ? colors.fg : colors.axis);
      ctx.strokeStyle = colors.panel;
      ctx.lineWidth = hovered ? 3 : 1.5;
      ctx.beginPath();
      ctx.arc(node.x, node.y, hovered ? 6 : (pinned ? 4.5 : 3.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
      if (pinned && !hovered) drawSharedPinnedMarker(ctx, node);
    }

    function renderSharedMixLegend(chart, row, config) {
      const el = document.getElementById(chart.legendId);
      if (!el) return;
      if (!row) {
        el.innerHTML = '<span class="muted">' + esc(config.emptyText) + '</span>';
        return;
      }
      const mix = config.mix(row);
      el.innerHTML =
        '<strong title="' + esc(config.title(row)) + '">' + esc(config.displayTitle(row)) + '</strong>' +
        '<span>' + esc(config.valueText(row)) + '</span>' +
        sharedMixSegments.map(segment => (
          '<span class="mix-pill"><span class="swatch" style="background:' + esc(segment.color()) + '"></span>' +
          esc(segment.label) + ' ' + esc(segmentShareText(row, segment, mix)) + '</span>'
        )).join('');
    }

    function renderSharedMixChart(chart, rows, config) {
      const canvas = document.getElementById(chart.canvasId);
      if (!canvas) return;
      const nextRows = rows || [];
      const nextKey = sharedMixKey(nextRows, config);
      const dataChanged = nextKey !== chart.dataKey;
      chart.rows = nextRows;
      chart.config = config;
      chart.dataKey = nextKey;
      const { ctx, width, height } = sizeCanvas(canvas);
      ctx.clearRect(0, 0, width, height);
      if (chart.rows.length === 0) {
        chart.nodes = [];
        chart.plot = null;
        renderSharedMixLegend(chart, null, config);
        ctx.save();
        ctx.fillStyle = colors.muted;
        ctx.font = '13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillText(config.emptyText, 24, 48);
        ctx.restore();
        return;
      }
      if (dataChanged || chart.zoom.end <= chart.zoom.start || chart.zoom.end >= chart.rows.length) {
        chart.zoom.start = 0;
        chart.zoom.end = chart.rows.length - 1;
        chart.hoverIndex = null;
        if (config.pinOnClick) chart.pinnedIndex = null;
      }

      const margin = { top: 24, right: 24, bottom: 78, left: 78 };
      const plot = { left: margin.left, top: margin.top, width: width - margin.left - margin.right, height: height - margin.top - margin.bottom };
      chart.plot = plot;
      const range = visibleSharedRange(chart);
      const visible = chart.rows.slice(range.start, range.end + 1);
      const maxValue = Math.max(1, ...visible.map(row => config.value(row)));
      const maxScaled = Math.max(1, config.scale(maxValue));
      const x = index => plot.left + (visible.length === 1 ? plot.width / 2 : (index / (visible.length - 1)) * plot.width);
      const y = value => plot.top + plot.height - (config.scale(value) / maxScaled) * plot.height;

      ctx.save();
      ctx.font = '11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textBaseline = 'middle';
      for (const tick of [0, .25, .5, .75, 1]) {
        const yy = plot.top + plot.height - tick * plot.height;
        ctx.strokeStyle = colors.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(plot.left, yy);
        ctx.lineTo(plot.left + plot.width, yy);
        ctx.stroke();
        ctx.fillStyle = colors.muted;
        ctx.textAlign = 'right';
        ctx.fillText(config.axisText(Math.max(0, (10 ** (maxScaled * tick)) - 1)), plot.left - 10, yy);
      }

      ctx.strokeStyle = colors.axis;
      ctx.beginPath();
      ctx.moveTo(plot.left, plot.top);
      ctx.lineTo(plot.left, plot.top + plot.height);
      ctx.lineTo(plot.left + plot.width, plot.top + plot.height);
      ctx.stroke();

      for (const index of tickIndexes(visible.length, width < 760 ? 5 : 8)) {
        const xx = x(index);
        const rawLabel = config.xLabel(visible[index]);
        const label = rawLabel.length > 22 ? rawLabel.slice(0, 21) + '…' : rawLabel;
        ctx.strokeStyle = colors.axis;
        ctx.beginPath();
        ctx.moveTo(xx, plot.top + plot.height);
        ctx.lineTo(xx, plot.top + plot.height + 5);
        ctx.stroke();
        ctx.save();
        ctx.translate(xx, plot.top + plot.height + 14);
        ctx.rotate(-Math.PI / 7);
        ctx.fillStyle = colors.muted;
        ctx.textAlign = 'right';
        ctx.fillText(label, 0, 0);
        ctx.restore();
      }

      const points = visible.map((row, index) => ({ x: x(index), y: y(config.value(row)), row, globalIndex: range.start + index }));
      ctx.strokeStyle = colors.fg;
      ctx.globalAlpha = .55;
      ctx.lineWidth = 2.2;
      drawCanvasCatmullRom(ctx, points, .9);
      ctx.stroke();
      ctx.globalAlpha = 1;

      chart.nodes = points;
      const hoverPoint = points.find(point => point.globalIndex === chart.hoverIndex) || null;
      if (hoverPoint) drawSharedHoverGuide(ctx, hoverPoint, plot, config.xLabel(hoverPoint.row));
      for (const point of points) {
        drawSharedPoint(ctx, point, {
          hovered: point.globalIndex === chart.hoverIndex,
          pinned: config.pinOnClick && point.globalIndex === chart.pinnedIndex,
        });
      }

      ctx.fillStyle = colors.muted;
      ctx.textAlign = 'center';
      ctx.save();
      ctx.translate(18, plot.top + plot.height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(config.yLabel, 0, 0);
      ctx.restore();

      drawSharedSelection(ctx, chart);
      const legendRow = chart.hoverIndex != null
        ? chart.rows[chart.hoverIndex]
        : (config.pinOnClick && chart.pinnedIndex != null
          ? chart.rows[chart.pinnedIndex]
          : (config.summaryRow || chart.rows[range.start] || visible[0]));
      renderSharedMixLegend(chart, legendRow, config);
      ctx.restore();
    }

    function renderProjectDailyChart(selectedProject) {
      projectChart.selectedProject = selectedProject || null;
      projectChart.selectedProjectName = selectedProject?.name || null;
      renderSharedMixChart(projectChart, selectedProject?.daily || [], {
        key: 'project-' + (selectedProject?.name || ''),
        emptyText: selectedProject ? 'No daily project data' : 'No projects',
        yLabel: 'daily project cost (log)',
        value: row => row.costUsd || 0,

          ? selectedProject.name + ' · ' + (row.name === 'Total' ? 'Total' : row.name)

    function renderDailyTokenChart(rows) {
      renderSharedMixChart(dailyTokenChart, rows || [], {
        key: 'daily-token',
        emptyText: 'No daily token data',
        yLabel: 'tokens/day (log)',
        value: row => totalTokens(row),

      });
    }

    function bindSharedMixCanvas(chart) {
      const canvas = document.getElementById(chart.canvasId);
      if (!canvas) return;
      const nearestNode = (x, y, maxDistance = 18) => {
        let nearest = null;
        let nearestDistance = Infinity;
        for (const node of chart.nodes) {
          const distance = Math.hypot(node.x - x, node.y - y);
          if (distance < nearestDistance) {
            nearest = node;
            nearestDistance = distance;
          }
        }
        return nearestDistance <= maxDistance ? nearest : null;
      };
      canvas.addEventListener('mousemove', event => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const nearest = nearestNode(x, y);
        if (nearest) {
          chart.hoverIndex = nearest.globalIndex;
          rerenderSharedMixChart(chart);
        } else if (chart.hoverIndex != null) {
          chart.hoverIndex = null;
          rerenderSharedMixChart(chart);
        }
        if (chart.dragStartX != null) {
          chart.dragCurrentX = x;
          rerenderSharedMixChart(chart);
        }
      });
      canvas.addEventListener('mouseleave', () => {
        chart.hoverIndex = null;
        chart.dragStartX = null;
        chart.dragCurrentX = null;
        rerenderSharedMixChart(chart);
      });
      canvas.addEventListener('mousedown', event => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        if (!chart.plot || x < chart.plot.left || x > chart.plot.left + chart.plot.width) return;
        chart.dragStartX = x;
        chart.dragCurrentX = x;
      });
      window.addEventListener('mouseup', event => {
        if (chart.dragStartX == null) return;
        const rect = canvas.getBoundingClientRect();
        const endX = event.clientX - rect.left;
        const startX = chart.dragStartX;
        chart.dragStartX = null;
        chart.dragCurrentX = null;
        if (Math.abs(endX - startX) < 14) {
          if (chart.config?.pinOnClick) {
            const endY = event.clientY - rect.top;
            const node = nearestNode(endX, endY);
            chart.pinnedIndex = node && chart.pinnedIndex !== node.globalIndex ? node.globalIndex : null;
            chart.hoverIndex = node?.globalIndex ?? null;
          }
          rerenderSharedMixChart(chart);
          return;
        }
        if (endX > startX) {
          applySharedZoom(chart, sharedIndexFromX(chart, startX), sharedIndexFromX(chart, endX));
        } else {
          zoomSharedChartAt(chart, (startX + endX) / 2, 1);
        }
      });
      canvas.addEventListener('wheel', event => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        zoomSharedChartAt(chart, event.clientX - rect.left, event.deltaY);
      }, { passive: false });
      canvas.addEventListener('dblclick', () => {
        chart.zoom.start = 0;
        chart.zoom.end = Math.max(0, chart.rows.length - 1);
        rerenderSharedMixChart(chart);
      });
    }

    let cachedSummary = null;
    let costMixMode = 'models';
    let dailyRangeDays = 90;
    const overviewModelLimit = 10;
    let dashboardMode = storedDashboardMode();

    function storedDashboardMode() {
      try {
        return localStorage.getItem('tokenomics-dashboard-mode') === 'analyst' ? 'analyst' : 'overview';
      } catch {
        return 'overview';
      }
    }

    function applyDashboardMode({ persist = true } = {}) {
      document.body.dataset.dashboardMode = dashboardMode;
      document.querySelectorAll('#dashboard-mode-controls [data-dashboard-mode]').forEach(button => {
        const active = button.dataset.dashboardMode === dashboardMode;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
      if (persist) {
        try { localStorage.setItem('tokenomics-dashboard-mode', dashboardMode); } catch {}
      }
      if (dashboardMode === 'overview' && ['projects-section', 'efficiency-section'].includes(activeSectionTarget)) {
        activeSectionTarget = 'overview-section';
      }
      if (cachedSummary) {
        renderRecommendations(cachedSummary);
        renderCostMix(cachedSummary);
        requestAnimationFrame(() => {
          renderDailyTokenChart(dailyRowsInRange(cachedSummary.daily));
          if (dashboardMode === 'analyst') renderProjectDailyChart(selectedProjectFromSummary(cachedSummary));
        });
      }
      syncSectionNav();
    }

    function dailyRowsInRange(rows) {
      if (!Number.isFinite(dailyRangeDays) || !rows?.length) return rows || [];
      const lastTime = Date.parse(rows.at(-1).name + 'T00:00:00Z');
      if (!Number.isFinite(lastTime)) return rows;
      const cutoff = lastTime - (dailyRangeDays - 1) * 86_400_000;
      return rows.filter(row => Date.parse(row.name + 'T00:00:00Z') >= cutoff);
    }

    function renderDailyRangeControls() {
      document.querySelectorAll('#daily-range-controls [data-range-days]').forEach(button => {
        const value = button.dataset.rangeDays === 'all' ? Infinity : Number(button.dataset.rangeDays);
        button.classList.toggle('active', value === dailyRangeDays);
      });
    }

    function costMixRows(summary) {
      const source = costMixMode === 'models' ? summary.topModels : (summary[costMixMode] || []);
      return [...source].sort((a, b) => (b.costUsd || 0) - (a.costUsd || 0)).slice(0, 15);
    }

    function renderCostMixControls() {
      document.querySelectorAll('#cost-mix-controls [data-mix-mode]').forEach(button => {
        button.classList.toggle('active', button.dataset.mixMode === costMixMode);

    function renderModelRanking(summary) {

      const maxCost = Math.max(1, ...rows.map(row => row.costUsd || 0));

      document.getElementById('cost-mix-hover-legend').innerHTML =
        '<span class="muted">' + esc(formatTokenCount(rows.length)) + ' of ' + esc(formatTokenCount(allRows.length)) + ' models · ' + esc(formatUsdCompact(rows.reduce((sum, row) => sum + (row.costUsd || 0), 0))) + '</span>';
      container.innerHTML = '<table class="model-table"><thead><tr><th>Model</th><th>Cost</th><th>Share</th><th></th></tr></thead><tbody>' +
        rows.map(row => {
          const share = (row.costUsd || 0) / totalCost;

            '<td class="model-name" title="' + esc(row.name) + '">' + esc(row.name) + '</td>' +

            '<td><div class="rank-bar-track"><span class="rank-bar" style="width:' + width.toFixed(1) + '%"></span></div></td>' +
            '</tr>';
        }).join('') + '</tbody></table>';

          '<p class="recommendation-action"><strong>Action:</strong> ' + esc(row.action) + '</p>' +
          '<p class="recommendation-meta">' + esc(row.confidence.toUpperCase()) + ' confidence · ' + esc(row.evidence) + '</p>' +
          '<p class="recommendation-caveat">' + esc(row.caveat) + '</p>' +
        '</article>'
      )).join('');
    }

    function selectedProjectFromSummary(summary) {
      const projects = summary?.projectDaily || [];
      const select = document.getElementById('project-select');
      const index = clamp(Number(select?.value || 0), 0, Math.max(0, projects.length - 1));
      return projects[index] || null;
    }

    function renderProjectSelector(summary) {
      const select = document.getElementById('project-select');
      const projects = summary.projectDaily || [];
      const previousValue = select.value;
      if (!projects.length) {
        select.innerHTML = '<option value="0">No projects</option>';
        select.disabled = true;
        return;
      }
      select.disabled = false;
      select.innerHTML = projects.map((project, index) => {
        const label = projectLabel(project.name) + ' · ' + formatUsdCompact(project.costUsd || 0);
        return '<option value="' + index + '" title="' + esc(project.name) + '">' + esc(label) + '</option>';
      }).join('');
      const previousIndex = Number(previousValue);
      if (Number.isInteger(previousIndex) && projects[previousIndex]) select.value = String(previousIndex);
      else select.value = '0';
    }

    function render(summary) {
      cachedSummary = summary;
      const updated = document.getElementById('updated');
      updated.textContent = 'Updated just now';
      updated.title = new Date(summary.generatedAt).toLocaleString();
      document.getElementById('cards').innerHTML = [
        card('Cost', formatUsdCompact(summary.total.costUsd || 0)),
        card('Requests', formatTokenCount(summary.total.requests || 0)),
        card('Input Tokens', segmentCardText(summary.total, 'input'), 'token-card'),
        card('Cache Tokens', segmentCardText(summary.total, 'cache'), 'token-card'),
        card('Output Tokens', segmentCardText(summary.total, 'output'), 'token-card'),
      ].join('');
      renderRecommendations(summary);
      renderDailyRangeControls();
      renderDailyTokenChart(dailyRowsInRange(summary.daily));
      renderCostMix(summary);
      renderProjectSelector(summary);
      renderProjectDailyChart(selectedProjectFromSummary(summary));
      renderEfficiency(summary);
    }

    const delay = milliseconds => new Promise(resolve => setTimeout(resolve, milliseconds));
    let syncPollGeneration = 0;
    let syncEventSource = null;
    let syncAvailable = false;

    async function loadSummary() {
      const response = await fetch('/api/summary', { cache: 'no-store' });
      if (!response.ok) throw new Error('Summary request failed: HTTP ' + response.status);
      render(await response.json());
    }

    function renderSyncStatus(sync) {
      const button = document.getElementById('sync-dashboard');
      const dot = document.getElementById('sync-status-dot');
      const updated = document.getElementById('updated');
      const state = sync?.state || 'idle';
      if (typeof sync?.available === 'boolean') syncAvailable = sync.available;
      const running = state === 'running';
      button.disabled = running || !syncAvailable;
      button.textContent = running ? 'Syncing...' : 'Sync';
      dot.classList.toggle('running', running);
      dot.classList.toggle('failed', state === 'failed');
      dot.classList.toggle('unavailable', !syncAvailable);
      if (!syncAvailable) {
        updated.textContent = 'Sync unavailable';
        updated.title = sync?.unavailableReason || 'Sync is disabled for this webserver binding.';
        button.title = updated.title;
      } else if (running) {
        const progress = sync.progress || {};
        const completed = progress.completedSources || 0;
        const candidates = progress.candidateSources;
        const count = Number.isFinite(candidates) ? ' ' + completed + '/' + candidates : '';
        const source = progress.currentSource ? ' · ' + shortSource(progress.currentSource) : '';
        const bytes = progress.bytesProcessed ? ' · ' + formatBytes(progress.bytesProcessed) : '';
        const phase = progress.phase === 'finalizing' ? 'Finalizing' : (progress.phase === 'processing' ? 'Processing' : 'Discovering');
        updated.textContent = phase + count + bytes + source;
        updated.title = sync.startedAt ? 'Started ' + new Date(sync.startedAt).toLocaleString() : '';
      } else if (state === 'failed') {
        updated.textContent = 'Sync failed';
        updated.title = sync.error || 'Unknown sync error';
      } else if (state === 'succeeded') {
        const result = sync.result || {};
        updated.textContent = 'Synced ' + (result.changedSources || 0) + ' changed · ' +
          (result.skippedSources || 0) + ' skipped · ' + formatDuration(result.durationMs || 0);
        updated.title = sync.finishedAt ? new Date(sync.finishedAt).toLocaleString() : '';
      }
    }

    function shortSource(value) {
      const parts = String(value).split(/[\\/:]/);
      return parts[parts.length - 1] || String(value);
    }

    function formatDuration(milliseconds) {
      if (milliseconds < 1_000) return Math.round(milliseconds) + 'ms';
      if (milliseconds < 60_000) return (milliseconds / 1_000).toFixed(1) + 's';
      return (milliseconds / 60_000).toFixed(1) + 'm';
    }

    function formatBytes(value) {
      const units = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
      let amount = Math.max(0, value || 0);
      let unit = 0;
      while (amount >= 1024 && unit < units.length - 1) {
        amount /= 1024;
        unit += 1;
      }
      return amount.toFixed(unit === 0 ? 0 : 1) + units[unit];
    }

    async function fetchSyncStatus() {
      const response = await fetch('/api/sync', { cache: 'no-store' });
      if (!response.ok) throw new Error('Sync status request failed: HTTP ' + response.status);
      return (await response.json()).sync;
    }

    async function pollSyncStatus() {
      const generation = ++syncPollGeneration;
      let failures = 0;
      while (generation === syncPollGeneration) {
        await delay(700);
        try {
          const sync = await fetchSyncStatus();
          failures = 0;
          renderSyncStatus(sync);
          if (sync.state !== 'running') {
            if (sync.state === 'succeeded') {
              await loadSummary();
              renderSyncStatus(sync);
            }
            return;
          }
        } catch (error) {
          failures += 1;
          if (failures >= 5) {
            const button = document.getElementById('sync-dashboard');
            button.disabled = false;
            button.textContent = 'Sync';
            document.getElementById('updated').textContent = 'Sync status unavailable';
            document.getElementById('updated').title = error.message;
            console.error(error);
            return;
          }
        }
      }
    }

    function closeSyncEventSource() {
      if (!syncEventSource) return;
      syncEventSource.close();
      syncEventSource = null;
    }

    function watchSyncStatus() {
      syncPollGeneration += 1;
      closeSyncEventSource();
      if (typeof EventSource !== 'function') {
        pollSyncStatus();
        return;
      }
      const generation = syncPollGeneration;
      const events = new EventSource('/api/sync/events');
      syncEventSource = events;
      events.onmessage = async event => {
        if (generation !== syncPollGeneration) return;
        try {
          const sync = JSON.parse(event.data).sync;
          renderSyncStatus(sync);
          if (sync.state !== 'running') {
            closeSyncEventSource();
            if (sync.state === 'succeeded') {
              await loadSummary();
              renderSyncStatus(sync);
            }
          }
        } catch (error) {
          console.error(error);
        }
      };
      events.onerror = () => {
        if (generation !== syncPollGeneration) return;
        closeSyncEventSource();
        pollSyncStatus();
      };
    }

    async function startSync() {
      syncPollGeneration += 1;
      closeSyncEventSource();
      renderSyncStatus({ state: 'running', available: syncAvailable, startedAt: new Date().toISOString() });
      try {
        const response = await fetch('/api/sync', {
          method: 'POST',
          headers: { 'x-tokenomics-action': 'sync' },
        });
        const body = await response.json();
        if (!response.ok) throw new Error(body.error || 'Sync request failed: HTTP ' + response.status);
        renderSyncStatus(body.sync);
        if (body.sync.state === 'running') watchSyncStatus();
        else if (body.sync.state === 'succeeded') {
          await loadSummary();
          renderSyncStatus(body.sync);
        }
      } catch (error) {
        renderSyncStatus({ state: 'failed', available: syncAvailable, error: error.message });
        console.error(error);
      }
    }

    async function initializeDashboard() {
      const [, sync] = await Promise.all([loadSummary(), fetchSyncStatus()]);
      renderSyncStatus(sync);
      if (sync.state === 'running') watchSyncStatus();
    }

    document.getElementById('cost-mix-controls').addEventListener('click', event => {
      const mode = event.target?.dataset?.mixMode;
      if (!mode) return;
      costMixMode = mode;
      if (cachedSummary) renderCostMix(cachedSummary);
    });
    document.getElementById('daily-range-controls').addEventListener('click', event => {
      const raw = event.target?.dataset?.rangeDays;
      if (!raw) return;
      dailyRangeDays = raw === 'all' ? Infinity : Number(raw);
      dailyTokenChart.zoom.start = 0;
      dailyTokenChart.zoom.end = 0;
      dailyTokenChart.hoverIndex = null;
      if (cachedSummary) {
        renderDailyRangeControls();
        renderDailyTokenChart(dailyRowsInRange(cachedSummary.daily));
      }
    });
    document.getElementById('sync-dashboard').addEventListener('click', () => {
      startSync();
    });
    document.getElementById('dashboard-mode-controls').addEventListener('click', event => {
      const mode = event.target?.dataset?.dashboardMode;
      if (!['overview', 'analyst'].includes(mode) || mode === dashboardMode) return;
      dashboardMode = mode;
      applyDashboardMode();
    });
    let activeSectionTarget = 'overview-section';
    function syncSectionNav() {
      const analysisTop = document.getElementById('models-section').getBoundingClientRect().top;
      const efficiencyTop = document.getElementById('efficiency-section').getBoundingClientRect().top;
      if (window.scrollY < 80) activeSectionTarget = 'overview-section';
      else if (efficiencyTop <= 120) activeSectionTarget = 'efficiency-section';
      else if (analysisTop <= 120 && !['models-section', 'projects-section'].includes(activeSectionTarget)) activeSectionTarget = 'models-section';
      document.querySelectorAll('#section-nav [data-section-target]').forEach(button => {
        button.classList.toggle('active', button.dataset.sectionTarget === activeSectionTarget);
      });
    }
    document.getElementById('section-nav').addEventListener('click', event => {
      const targetId = event.target?.dataset?.sectionTarget;
      if (!targetId) return;
      activeSectionTarget = targetId;
      syncSectionNav();
      document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    window.addEventListener('scroll', syncSectionNav, { passive: true });
    document.getElementById('project-select').addEventListener('change', () => {
      projectChart.selectedProjectName = null;
      projectChart.hoverIndex = null;
      projectChart.pinnedIndex = null;
      projectChart.zoom.start = 0;
      projectChart.zoom.end = 0;
      if (cachedSummary) renderProjectDailyChart(selectedProjectFromSummary(cachedSummary));
    });
    bindSharedMixCanvas(dailyTokenChart);
    bindSharedMixCanvas(costChart);
    bindSharedMixCanvas(projectChart);
    new ResizeObserver(() => { if (cachedSummary) renderDailyTokenChart(dailyRowsInRange(cachedSummary.daily)); }).observe(document.getElementById('daily-token-canvas'));
    new ResizeObserver(() => { if (cachedSummary) renderCostMix(cachedSummary); }).observe(document.getElementById('cost-mix-canvas'));
    new ResizeObserver(() => { if (cachedSummary) renderProjectDailyChart(selectedProjectFromSummary(cachedSummary)); }).observe(document.getElementById('project-cost-canvas'));
    applyDashboardMode({ persist: false });
    initializeDashboard().catch(error => { document.body.innerHTML = '<main><section><h2>Failed to load dashboard</h2><pre>' + esc(error.stack || error.message) + '</pre></section></main>'; });
  </script>
</body>
</html>
