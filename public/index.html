 <!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokenomics Viewer</title>
  <style>
    :root { color-scheme: light dark; --bg:#f8f9f8; --fg:#202124; --muted:#687076; --line:#dfe2df; --panel:#ffffff; --accent:#2563eb; --cache:#0f9f6e; --out:#c2410c; --warn:#b45309; --axis:#8b949e; --grid:rgba(104,112,118,.18); --soft:rgba(104,112,118,.07); }
    @media (prefers-color-scheme: dark) { :root { --bg:#111315; --fg:#f2f2ef; --muted:#a6adb4; --line:#30343a; --panel:#181b1f; --accent:#6ea8fe; --cache:#39d39f; --out:#ff9a62; --warn:#f5c36b; --axis:#89929b; --grid:rgba(166,173,180,.18); --soft:rgba(166,173,180,.08); } }
    * { box-sizing: border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow-x:hidden; }
    button, select, input { font:inherit; }
    .app-header { position:sticky; top:0; z-index:5; background:color-mix(in srgb, var(--panel) 96%, transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(12px); }
    .brand-row { min-height:50px; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:8px 20px; }
    .brand-group, .header-actions, .sync-state { display:flex; align-items:center; gap:10px; }
    .brand-group { min-width:0; }
    .header-actions { flex-shrink:0; }
    .sync-state { min-width:0; max-width:min(70vw, 780px); color:var(--muted); font-size:12px; }
    #updated { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:var(--cache); box-shadow:0 0 0 3px color-mix(in srgb, var(--cache) 15%, transparent); }
    .status-dot.running { background:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); animation:sync-pulse 1.4s ease-in-out infinite; }
    .status-dot.failed { background:var(--out); box-shadow:0 0 0 3px color-mix(in srgb, var(--out) 15%, transparent); }
    .status-dot.unavailable { background:var(--axis); box-shadow:none; }
    @keyframes sync-pulse { 50% { opacity:.35; } }
    @media (prefers-reduced-motion: reduce) { .status-dot.running { animation:none; } }
    h1 { margin:0; font-size:18px; letter-spacing:0; }
    .action-button { min-height:32px; border:1px solid var(--line); border-radius:6px; padding:5px 10px; color:var(--fg); background:var(--panel); cursor:pointer; }
    .action-button:hover { border-color:var(--axis); background:var(--soft); }
    .action-button:focus-visible, .seg-button:focus-visible, .nav-button:focus-visible, select:focus-visible, input:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .action-button:disabled { cursor:not-allowed; color:var(--muted); }
    .section-nav { display:flex; gap:24px; min-height:38px; padding:0 20px; overflow:auto; }
    .nav-button { position:relative; border:0; background:transparent; color:var(--muted); padding:8px 0 9px; cursor:pointer; white-space:nowrap; }
    .nav-button.active { color:var(--accent); font-weight:650; }
    .nav-button.active::after { content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--accent); }
    main { padding:16px 20px 28px; display:grid; gap:14px; max-width:1600px; margin:0 auto; }
    section { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; min-width:0; scroll-margin-top:104px; }
    .kpi-band { padding:0; }
    .cards { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); }
    .card { min-width:0; padding:14px 16px; border-right:1px solid var(--line); }
    .card:last-child { border-right:0; }
    .label { color:var(--muted); font-size:12px; }
    .value { font-size:22px; font-weight:700; margin-top:3px; overflow-wrap:anywhere; font-variant-numeric:tabular-nums; }
    .card-meta { color:var(--muted); font-size:12px; margin-top:2px; font-variant-numeric:tabular-nums; }
    .token-card .value { font-size:16px; white-space:nowrap; }
    .plan-grid, .quota-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:12px; }
    .plan-grid { margin-bottom:12px; }
    .plan-item, .quota-item { min-width:0; border:1px solid var(--line); border-radius:6px; padding:12px; }
    .plan-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .plan-name { margin-top:5px; font-size:16px; font-weight:700; }
    .plan-badge { border:1px solid var(--line); border-radius:999px; padding:2px 7px; color:var(--muted); font-size:11px; white-space:nowrap; }
    .plan-evidence { margin-top:5px; color:var(--muted); font-size:12px; }
    .plan-history { margin-top:9px; border-top:1px solid var(--line); }
    .plan-history-row { display:grid; grid-template-columns:74px minmax(0, 1fr); gap:8px; padding-top:7px; color:var(--muted); font-size:11px; }
    .plan-history-row strong { color:var(--ink); font-weight:600; }
    .quota-head, .quota-metric, .quota-model-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .quota-head strong, .quota-metric strong { font-variant-numeric:tabular-nums; }
    .quota-track { height:8px; margin:9px 0; background:var(--soft); overflow:hidden; }
    .quota-fill { display:block; height:100%; background:var(--accent); }
    .quota-meta { color:var(--muted); font-size:12px; }
    .quota-models { margin-top:9px; padding-top:7px; border-top:1px solid var(--line); }
    .quota-model-row { padding:3px 0; font-size:12px; }
    .quota-model-row span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .panel-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .panel-title-stack { display:grid; gap:6px; min-width:0; }
    .chart-head-meta { display:grid; justify-items:end; gap:8px; min-width:0; }
    h2 { margin:0; font-size:16px; }
    .control-select { max-width:min(420px, 100%); min-width:220px; border:1px solid var(--line); border-radius:6px; background:var(--panel); color:var(--fg); padding:6px 28px 6px 8px; }
    .segmented { display:inline-flex; align-items:center; gap:2px; border:1px solid var(--line); border-radius:6px; padding:2px; background:var(--soft); }
    .seg-button { border:0; border-radius:4px; background:transparent; color:var(--muted); padding:5px 8px; font:inherit; font-size:12px; cursor:pointer; }
    .seg-button.active { background:var(--panel); color:var(--fg); box-shadow:0 0 0 1px var(--line); }
    .swatch { width:10px; height:10px; border-radius:999px; display:inline-block; }
    .chart-wrap { position:relative; min-height:390px; }
    .project-chart-wrap { position:relative; min-height:330px; }
    .chart-tooltip { position:absolute; z-index:4; display:none; width:420px; max-width:calc(100% - 16px); max-height:260px; overflow:auto; padding:9px 10px; border:1px solid var(--line); border-radius:6px; background:color-mix(in srgb, var(--panel) 96%, transparent); box-shadow:0 8px 24px rgba(0,0,0,.16); pointer-events:none; font-size:12px; }
    .chart-tooltip.visible { display:block; }
    .tooltip-title { font-weight:700; margin-bottom:5px; }
    .tooltip-row { display:grid; grid-template-columns:minmax(110px, 1fr) auto; gap:12px; align-items:center; padding:4px 0; border-top:1px solid var(--line); }
    .tooltip-model { display:flex; align-items:center; gap:6px; min-width:0; }
    .tooltip-model span:last-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tooltip-value { text-align:right; font-variant-numeric:tabular-nums; }
    .mix-canvas { width:100%; height:390px; display:block; cursor:crosshair; touch-action:none; }
    .compact-canvas { height:330px; }
    .model-ranking { min-height:250px; }
    .model-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .model-table th, .model-table td { padding:7px 6px; }
    .model-table th:first-child, .model-table td:first-child { width:38%; }
    .model-table .model-name { overflow:hidden; text-overflow:ellipsis; }
    .rank-bar-track { height:6px; background:var(--soft); }
    .rank-bar { display:block; height:100%; background:var(--axis); }
    .date-controls { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px; }
    .date-control-group { display:flex; align-items:center; gap:6px; }
    .date-input { min-height:32px; border:1px solid var(--line); border-radius:6px; padding:5px 7px; color:var(--fg); background:var(--panel); }
    .date-label { display:flex; align-items:center; gap:5px; color:var(--muted); font-size:12px; }
    .chart-help { position:relative; width:26px; height:26px; border:1px solid var(--line); border-radius:50%; padding:0; color:var(--muted); background:var(--panel); cursor:help; font-weight:700; }
    .chart-help::after { content:attr(data-tooltip); position:absolute; z-index:8; top:calc(100% + 8px); right:0; width:280px; padding:8px 10px; border:1px solid var(--line); border-radius:6px; color:var(--fg); background:var(--panel); box-shadow:0 8px 24px rgba(0,0,0,.16); font-size:12px; font-weight:400; line-height:1.4; text-align:left; pointer-events:none; opacity:0; transform:translateY(-3px); transition:opacity .12s ease, transform .12s ease; }
    .chart-help:hover::after, .chart-help:focus-visible::after { opacity:1; transform:translateY(0); }
    .mix-canvas[data-interaction="pan"] { cursor:grab; }
    .mix-canvas[data-interaction="pan"]:active { cursor:grabbing; }
    .model-detail-table { width:100%; border-collapse:collapse; min-width:1120px; }
    .model-detail-table th:first-child, .model-detail-table td:first-child { text-align:left; }
    .model-detail-table tfoot td { border-top:2px solid var(--line); font-weight:650; }
    .model-provider { display:block; color:var(--muted); font-size:11px; font-weight:400; }
    .metric-cell { display:grid; justify-items:end; gap:1px; }
    .metric-cell strong { color:var(--fg); font-weight:650; }
    .metric-cell span { color:var(--muted); font-size:11px; }
    .project-model-summary { margin-top:12px; border-top:1px solid var(--line); padding-top:10px; }
    .project-model-table { width:100%; border-collapse:collapse; min-width:1120px; }
    .settings-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:10px; margin-bottom:14px; }
    .settings-field { display:grid; gap:5px; color:var(--muted); font-size:12px; }
    .settings-field select, .settings-field input, .pricing-table input, .pricing-table select { min-height:32px; border:1px solid var(--line); border-radius:5px; padding:5px 7px; color:var(--fg); background:var(--panel); }
    .settings-actions { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px; }
    .configuration-status.stale { color:var(--warn); }
    .pricing-table { width:100%; border-collapse:collapse; min-width:1580px; }
    .pricing-table th, .pricing-table td { padding:6px 5px; }
    .pricing-scroll { max-height:min(68vh, 760px); border-top:1px solid var(--line); }
    .pricing-table thead th { position:sticky; top:0; z-index:2; background:var(--panel); }
    .pricing-table th:first-child, .pricing-table td:first-child { position:sticky; left:0; z-index:1; width:104px; background:var(--panel); }
    .pricing-table th:nth-child(2), .pricing-table td:nth-child(2) { position:sticky; left:104px; z-index:1; width:190px; background:var(--panel); box-shadow:1px 0 0 var(--line); }
    .pricing-table thead th:first-child, .pricing-table thead th:nth-child(2) { z-index:3; }
    .pricing-table input, .pricing-table select { width:100%; min-width:86px; }
    .pricing-table .price-model { min-width:180px; }
    .pricing-table .price-source { min-width:200px; }
    .pricing-table .price-number { min-width:80px; text-align:right; }
    .icon-button { width:32px; height:32px; border:1px solid var(--line); border-radius:6px; color:var(--fg); background:var(--panel); cursor:pointer; font-size:18px; line-height:1; }
    .icon-button:hover { border-color:var(--out); color:var(--out); }
    .is-hidden { display:none !important; }
    #efficiency-table { width:100%; border-collapse:collapse; min-width:920px; }
    th, td { padding:8px 10px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
    th:first-child, td:first-child { text-align:left; }
    th { color:var(--muted); font-weight:600; font-size:12px; }
    td:first-child { max-width:520px; overflow:hidden; text-overflow:ellipsis; }
    .table-scroll { overflow:auto; max-width:100%; }
    .seg-input { background:var(--accent); }
    .seg-cache { background:var(--cache); }
    .seg-output { background:var(--out); }
    .hover-legend { display:grid; justify-items:end; gap:5px; min-height:24px; color:var(--muted); font-size:12px; }
    .legend-line { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:8px; }
    .hover-legend strong { color:var(--fg); font-weight:650; max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mix-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 7px; border:1px solid var(--line); border-radius:999px; background:var(--soft); white-space:nowrap; }
    .muted { color:var(--muted); }
    .recommendation-list { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); border-top:1px solid var(--line); }
    .recommendation-item { min-width:0; padding:14px 16px; border-bottom:1px solid var(--line); }
    .recommendation-item:nth-child(odd) { border-right:1px solid var(--line); }
    .recommendation-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .recommendation-title { font-weight:700; }
    .recommendation-impact { color:var(--out); font-weight:700; white-space:nowrap; }
    .recommendation-item p { margin:8px 0 0; }
    .recommendation-action { color:var(--fg); }
    .recommendation-meta, .recommendation-caveat { color:var(--muted); font-size:12px; }
    body[data-dashboard-mode="overview"] .analyst-only { display:none !important; }
    body[data-dashboard-mode="analyst"] .overview-only { display:none !important; }
    #pricing-settings { display:none; }
    body[data-dashboard-mode="settings"] main > :not(#pricing-settings) { display:none !important; }
    body[data-dashboard-mode="settings"] #pricing-settings { display:block; }
    body[data-dashboard-mode="settings"] .section-nav { display:none; }
    @media (max-width: 1180px) { .cards { grid-template-columns:repeat(3, minmax(0, 1fr)); } .card:nth-child(3) { border-right:0; } .card:nth-child(n+4) { border-top:1px solid var(--line); } }
    @media (max-width: 760px) { .cards { grid-template-columns:repeat(2, minmax(0, 1fr)); } .card, .card:nth-child(3) { border-right:1px solid var(--line); border-top:1px solid var(--line); } .card:nth-child(-n+2) { border-top:0; } .card:nth-child(2n) { border-right:0; } .card:last-child { grid-column:1 / -1; border-right:0; } .panel-head { display:grid; } .chart-head-meta { justify-items:start; } .hover-legend { justify-items:start; } .legend-line { justify-content:flex-start; } .date-controls { justify-content:flex-start; } .recommendation-list { grid-template-columns:1fr; } .recommendation-item:nth-child(odd) { border-right:0; } .settings-grid { grid-template-columns:1fr; } .settings-actions { justify-content:flex-start; } .pricing-table th:nth-child(2), .pricing-table td:nth-child(2) { position:static; box-shadow:none; } }
    @media (max-width: 560px) { .brand-row { align-items:flex-start; flex-wrap:wrap; } .brand-group { align-items:flex-start; flex-direction:column; gap:3px; } .header-actions { width:100%; justify-content:space-between; } .sync-state { max-width:240px; } .section-nav { gap:18px; } main { padding:12px; } section { scroll-margin-top:170px; } .cards { grid-template-columns:1fr; } .card, .card:nth-child(3), .card:nth-child(2n) { border-right:0; border-top:1px solid var(--line); } .card:first-child { border-top:0; } .card:last-child { grid-column:auto; } .token-card .value { white-space:normal; } .chart-wrap, .project-chart-wrap { min-height:330px; } .mix-canvas { height:330px; } .date-control-group { flex-wrap:wrap; } .chart-help::after { position:fixed; inset:auto 12px 12px 12px; width:auto; transform:translateY(3px); } }
  </style>
</head>
<body data-dashboard-mode="overview">
  <header class="app-header" id="app-header">
    <div class="brand-row">
      <div class="brand-group">
        <h1>Tokenomics</h1>
        <div class="sync-state" role="status" aria-live="polite"><span class="status-dot" id="sync-status-dot"></span><span id="updated">Loading...</span></div>
      </div>
      <div class="header-actions">
        <div class="segmented" id="dashboard-mode-controls" aria-label="Dashboard mode">
          <button class="seg-button active" type="button" data-dashboard-mode="overview" aria-pressed="true">Overview</button>
          <button class="seg-button" type="button" data-dashboard-mode="analyst" aria-pressed="false">Analyst</button>
          <button class="seg-button" type="button" data-dashboard-mode="settings" aria-pressed="false">Settings</button>
        </div>
        <button class="action-button" id="sync-dashboard" type="button" title="Scan logs and update the database" disabled>Sync</button>
      </div>
    </div>
    <nav class="section-nav" id="section-nav" aria-label="Dashboard sections">
      <button class="nav-button active" type="button" data-section-target="overview-section">Summary</button>
      <button class="nav-button analyst-only" type="button" data-section-target="projects-section">Projects</button>
      <button class="nav-button" type="button" data-section-target="models-section">Models</button>
      <button class="nav-button analyst-only" type="button" data-section-target="efficiency-section">Diagnostics</button>
    </nav>
  </header>
  <main>
    <section class="kpi-band" id="overview-section"><div class="cards" id="cards"></div></section>
    <section class="is-hidden" id="subscription-limits">
      <div class="panel-head"><div class="panel-title-stack"><h2>Subscription Limits</h2><div class="muted" id="subscription-limits-summary"></div></div></div>
      <div class="plan-grid" id="subscription-plan-grid"></div>
      <div class="quota-grid" id="subscription-limits-grid"></div>
    </section>
    <section id="recommendations-section">
      <div class="panel-head"><h2>Recommended Actions</h2><div class="muted" id="recommendations-summary"></div></div>
      <div class="recommendation-list" id="recommendations-list"></div>
    </section>
    <section>
      <div class="panel-head">
        <div class="panel-title-stack">
          <h2>Token Flow</h2>
          <div class="hover-legend" id="daily-token-hover-legend"></div>
        </div>
        <div class="date-controls">
          <div class="segmented" id="token-value-controls" aria-label="Token Flow value">
            <button class="seg-button active" type="button" data-token-flow-value="tokens" aria-pressed="true">Tokens</button>
            <button class="seg-button" type="button" data-token-flow-value="cost" aria-pressed="false">Cost</button>
          </div>
          <div class="segmented" id="token-interaction-controls" aria-label="Token Flow pointer mode">
            <button class="seg-button active" type="button" data-chart-interaction="pan" aria-pressed="true" title="Drag left or right to move through time">Pan</button>
            <button class="seg-button" type="button" data-chart-interaction="zoom" aria-pressed="false" title="Drag across a time range to zoom in">Zoom</button>
          </div>
          <button class="chart-help" type="button" aria-label="Token Flow mouse controls" data-tooltip="Hover anywhere: inspect the nearest interval. Wheel: zoom at pointer. Pan: drag left or right. Zoom: drag to select a range. Double-click: reset." title="Mouse controls">?</button>
          <div class="segmented" id="token-date-mode-controls" aria-label="Token Flow date mode">
            <button class="seg-button active" type="button" data-timeline-date-mode="relative" aria-pressed="true">Relative</button>
            <button class="seg-button" type="button" data-timeline-date-mode="absolute" aria-pressed="false">Absolute</button>
          </div>
          <select class="date-input" id="token-relative-range" aria-label="Token Flow relative date range">
            <option value="month">MTD</option><option value="30" selected>1M</option><option value="90">3M</option><option value="180">6M</option><option value="365">1Y</option><option value="all">All</option>
          </select>
          <div class="date-control-group is-hidden" id="token-absolute-range">
            <label class="date-label">From <input class="date-input" id="token-date-from" type="date"></label>
            <label class="date-label">To <input class="date-input" id="token-date-to" type="date"></label>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas class="mix-canvas" id="daily-token-canvas" role="img" aria-label="Adaptive input, cache, and output token flow"></canvas></div>
    </section>
    <section class="analyst-only" id="projects-section">
        <div class="panel-head">
          <div class="panel-title-stack">
            <h2>Project Cost</h2>
            <select class="control-select" id="project-select" aria-label="Project"></select>
          </div>
          <div class="chart-head-meta">
            <div class="date-controls">
              <div class="segmented" id="project-interaction-controls" aria-label="Project Cost pointer mode">
                <button class="seg-button active" type="button" data-chart-interaction="pan" aria-pressed="true" title="Drag left or right to move through time">Pan</button>
                <button class="seg-button" type="button" data-chart-interaction="zoom" aria-pressed="false" title="Drag across a time range to zoom in">Zoom</button>
              </div>
              <button class="chart-help" type="button" aria-label="Project Cost mouse controls" data-tooltip="Hover anywhere: inspect the nearest interval. Wheel: zoom at pointer. Pan: drag left or right. Zoom: drag to select a range. Double-click: reset." title="Mouse controls">?</button>
              <div class="segmented" id="project-date-mode-controls" aria-label="Project Cost date mode">
                <button class="seg-button active" type="button" data-timeline-date-mode="relative" aria-pressed="true">Relative</button>
                <button class="seg-button" type="button" data-timeline-date-mode="absolute" aria-pressed="false">Absolute</button>
              </div>
              <select class="date-input" id="project-relative-range" aria-label="Project Cost relative date range">
                <option value="month">MTD</option><option value="30" selected>1M</option><option value="90">3M</option><option value="180">6M</option><option value="365">1Y</option><option value="all">All</option>
              </select>
              <div class="date-control-group is-hidden" id="project-absolute-range">
                <label class="date-label">From <input class="date-input" id="project-date-from" type="date"></label>

  </main>
  <script src="/timeline.js"></script>
  <script>
    const usd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 });
    const compact = new Intl.NumberFormat('en-US', { notation: 'compact', compactDisplay: 'short', maximumFractionDigits: 1 });
    const compactUsd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', notation: 'compact', compactDisplay: 'short', maximumFractionDigits: 1 });
    const colors = {
      input: getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
      cache: getComputedStyle(document.documentElement).getPropertyValue('--cache').trim(),
      output: getComputedStyle(document.documentElement).getPropertyValue('--out').trim(),
      fg: getComputedStyle(document.documentElement).getPropertyValue('--fg').trim(),
      muted: getComputedStyle(document.documentElement).getPropertyValue('--muted').trim(),
      panel: getComputedStyle(document.documentElement).getPropertyValue('--panel').trim(),
      line: getComputedStyle(document.documentElement).getPropertyValue('--line').trim(),
      grid: getComputedStyle(document.documentElement).getPropertyValue('--grid').trim(),
      axis: getComputedStyle(document.documentElement).getPropertyValue('--axis').trim(),
    };
    const pct = (part, total) => total > 0 ? Math.max(0, (part / total) * 100) : 0;
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

    function tokenCache(row) {
      return (row.cacheRead || 0) + (row.cacheCreate5m || 0) + (row.cacheCreate30m || 0) + (row.cacheCreate1h || 0);
    }

    function formatTokenCount(value) {
      return compact.format(value || 0);
    }

    function formatUsdCompact(value) {
      return Math.abs(value || 0) >= 1_000 ? compactUsd.format(value || 0) : usd.format(value || 0);
    }

    function card(label, value, className = '', meta = '') {
      return '<div class="card ' + esc(className) + '"><div class="label">' + esc(label) + '</div><div class="value">' + esc(value) + '</div>' +
        (meta ? '<div class="card-meta">' + esc(meta) + '</div>' : '') + '</div>';
    }

    function currentMonthCostMeta(month = {}) {
      const label = month.name ? periodLabel(month.name) : 'This month';
      const spend = formatUsdCompact(month.costUsd || 0);
      if (!Number.isFinite(month.limitUsd) || month.limitUsd <= 0) {
        return label + ' ' + spend + ' · Set monthly limit in Settings';
      }
      const distance = (month.overageUsd || 0) > 0
        ? formatUsdCompact(month.overageUsd) + ' over'
        : formatUsdCompact(month.remainingUsd || 0) + ' left';
      return label + ' ' + spend + ' / ' + formatUsdCompact(month.limitUsd) +
        ' · ' + formatPct(month.usedRatio || 0) + ' used · ' + distance;
    }

    function quotaWindowLabel(minutes) {
      if (minutes === 300) return '5-hour window';
      if (minutes === 10080) return 'Weekly window';
      if (minutes % 1440 === 0) return (minutes / 1440) + '-day window';
      if (minutes % 60 === 0) return (minutes / 60) + '-hour window';
      return minutes + '-minute window';
    }

    function renderSubscriptionPlans(summary) {
      const grid = document.getElementById('subscription-plan-grid');
      const plans = summary.subscriptionPlans || [];
      grid.innerHTML = plans.map(plan => {
        const badge = plan.source === 'protocol' ? (plan.stale ? 'Last observed' : 'Observed')
          : plan.source === 'inference' ? (plan.likelyPlanLabel ? 'Likely' : 'Historical')
          : plan.source === 'conflict' ? 'Conflict'
          : plan.source === 'unsupported' ? 'Unsupported'
          : 'Not detected';
        const inferred = plan.inference || null;
        const effective = plan.currentPlanLabel || (plan.lastObservedPlanLabel && plan.stale
          ? 'Current unknown · last observed ' + plan.lastObservedPlanLabel
          : plan.likelyPlanLabel
          ? 'Likely ' + plan.likelyPlanLabel
          : inferred?.lastInferredPlanLabel
          ? 'Current unknown · last inferred ' + inferred.lastInferredPlanLabel
          : 'Plan not observable');
        const capacity = Number.isFinite(plan.capacityMultiple) ? plan.capacityMultiple + 'x baseline' : null;
        const observed = plan.observedPlanType
          ? 'plan_type=' + plan.observedPlanType + (plan.observedAt ? ' · ' + new Date(plan.observedAt).toLocaleDateString() : '')
          : plan.conflict && plan.observedPlanTypes?.length
          ? 'conflicting plan_type=' + plan.observedPlanTypes.join(' / ')
          : null;
        const inferredEvidence = inferred
          ? 'limit-hit clusters ' + formatUsdCompact(inferred.lowMedianCostUsd) + ' / ' + formatUsdCompact(inferred.highMedianCostUsd) +
            ' · ' + inferred.capacityRatio.toFixed(1) + 'x' +
            (inferred.alternativePlanPair ? ' · alternate tier pair possible' : '') +
            (inferred.downgradeEligibleAt ? ' · downgrade possible after ' + inferred.downgradeEligibleAt.slice(0, 10) : '') +
            (inferred.evidenceExpiresAt ? ' · evidence fresh through ' + inferred.evidenceExpiresAt.slice(0, 10) : '')
          : null;
        const evidence = [capacity, observed, inferredEvidence, plan.stale ? 'Stale evidence' : null].filter(Boolean).join(' · ');
        const directHistory = (plan.history || []).slice(0, 8).map(day => {
          const signals = day.signals.map(signal => {
            const share = Number.isFinite(signal.share) ? ' ' + formatPct(signal.share) : '';
            return (signal.planLabel || signal.planType) + share;
          }).join(' · ');
          return '<div class="plan-history-row"><strong>' + esc(day.date.slice(5)) + '</strong><span>' + esc(signals) + '</span></div>';
        }).join('');
        const inferredHistory = (inferred?.segments || []).slice(-8).reverse().map(segment => {
          const range = segment.from.slice(5, 10) + (segment.through.slice(0, 10) === segment.from.slice(0, 10) ? '' : '–' + segment.through.slice(5, 10));
          const evidenceParts = [];
          if (segment.anchors) evidenceParts.push(segment.anchors + ' limit anchor' + (segment.anchors === 1 ? '' : 's'));
          if (segment.weeklyPeaks) evidenceParts.push(segment.weeklyPeaks + ' weekly lower bound' + (segment.weeklyPeaks === 1 ? '' : 's'));
          return '<div class="plan-history-row"><strong>' + esc(range) + '</strong><span>' + esc(segment.planLabel + ' · ' + evidenceParts.join(' · ')) + '</span></div>';
        }).join('');
        const peakHistory = (inferred?.weeklyPeaks || []).slice(-4).reverse().map(peak =>
          '<div class="plan-history-row"><strong>' + esc(peak.week.replace(/^\d{4}-/, '')) + '</strong><span>' +
          esc('max 5h ' + formatUsdCompact(peak.costUsd) + ' · heuristic floor ' + peak.minimumPlanLabel) + '</span></div>'
        ).join('');
        const history = directHistory || (inferredHistory + peakHistory);
        return '<div class="plan-item" title="' + esc(plan.caveat || '') + '">' +
          '<div class="plan-head"><strong>' + esc(plan.providerLabel) + '</strong><span class="plan-badge">' + esc(badge) + '</span></div>' +
          '<div class="plan-name">' + esc(effective) + '</div>' +
          '<div class="plan-evidence">' + esc(evidence || plan.caveat || '') + '</div>' +
          (history ? '<div class="plan-history">' + history + '</div>' : '') + '</div>';
      }).join('');
    }

    function renderSubscriptionWindows(summary) {
      const section = document.getElementById('subscription-limits');
      const windows = summary.subscriptionWindows || [];
      const subscription = summary.costSemantics === 'api-equivalent';
      section.classList.toggle('is-hidden', !subscription);
      if (!subscription) return;
      renderSubscriptionPlans(summary);
      document.getElementById('subscription-limits-summary').textContent =
        (summary.usageProfile?.name || 'Subscription') + ' · API list-price equivalent, not billed spend';
      const grid = document.getElementById('subscription-limits-grid');
      if (!windows.length) {
        grid.innerHTML = '<div class="muted">No quota window is currently reported by the provider.</div>';
        return;
      }
      grid.innerHTML = windows.map(window => {
        const used = Number.isFinite(window.usedPercent) ? window.usedPercent : 0;
        const reset = window.resetAt ? 'Resets ' + new Date(window.resetAt).toLocaleString() : 'Reset time not reported';
        const coverage = Number.isFinite(window.pricingCoverage) ? formatPct(window.pricingCoverage) + ' priced' : 'No priced requests observed';
        const timeCoverage = Number.isFinite(window.timeCoverage) ? formatPct(window.timeCoverage) + ' time coverage' : 'Unknown time coverage';
        const unit = Number.isFinite(window.apiEquivalentPerQuotaPointUsd)
          ? formatUsdCompact(window.apiEquivalentPerQuotaPointUsd) + ' API eq / quota point'
          : 'Per-point estimate unavailable';
        const models = (window.models || []).slice(0, 6).map(model =>
          '<div class="quota-model-row"><span title="' + esc(model.name) + '">' + esc(model.name) + '</span><strong>' + esc(formatUsdCompact(model.costUsd || 0)) + '</strong></div>'
        ).join('');
        return '<div class="quota-item">' +
          '<div class="quota-head"><strong>' + esc(quotaWindowLabel(window.windowMinutes)) + '</strong><strong>' + esc(used.toFixed(0) + '% used') + '</strong></div>' +
          '<div class="quota-track" aria-label="' + esc(used.toFixed(0) + '% quota used') + '"><span class="quota-fill" style="width:' + Math.max(0, Math.min(100, used)).toFixed(1) + '%"></span></div>' +
          '<div class="quota-metric"><span>API equivalent</span><strong>' + esc(formatUsdCompact(window.apiEquivalentCostUsd || 0)) + '</strong></div>' +
          '<div class="quota-meta">' + esc(reset + ' · ' + coverage + ' · ' + timeCoverage + ' · ' + unit) + '</div>' +
          (models ? '<div class="quota-models">' + models + '</div>' : '') + '</div>';
      }).join('');
    }

    function costMix(stats = {}) {
      const costs = stats.costsUsd || {};
      const input = costs.input || 0;
      const cache = (costs.cacheRead || 0) + (costs.cacheCreate5m || 0) + (costs.cacheCreate30m || 0) + (costs.cacheCreate1h || 0);
      const output = costs.output || 0;
      const total = input + cache + output;
      return {
        input,
        cache,
        output,
        total,
        inputPct: total > 0 ? input / total : 0,
        cachePct: total > 0 ? cache / total : 0,
        outputPct: total > 0 ? output / total : 0,
      };
    }

    function formatPct(value) {
      return Number.isFinite(value) ? (value * 100).toFixed(1) + '%' : '0.0%';
    }

    function segmentCost(row = {}, key) {
      const costs = row.costsUsd || {};
      if (key === 'cache') return (costs.cacheRead || 0) + (costs.cacheCreate5m || 0) + (costs.cacheCreate30m || 0) + (costs.cacheCreate1h || 0);
      return costs[key] || 0;
    }

    function segmentTokens(row = {}, key) {
      if (key === 'cache') return tokenCache(row);
      return row[key] || 0;
    }

    function segmentShareText(row, segment, mix) {
      const share = mix[segment.pctKey] || 0;
      return formatTokenCount(segmentTokens(row, segment.key)) + ' tokens / ' +
        formatUsdCompact(segmentCost(row, segment.key)) + ' / ' +
        formatPct(share);
    }

    function segmentCardText(row, key) {
      const mix = costMix(row);
      const share = mix[key + 'Pct'] || 0;
      return formatTokenCount(segmentTokens(row, key)) + ' / ' +
        formatUsdCompact(segmentCost(row, key)) + ' / ' +
        formatPct(share);
    }

    function tariffCoverage(row = {}) {
      return row.requests > 0 ? (row.pricedRequests || 0) / row.requests : 0;
    }

    function cacheWriteTokens(row = {}) {
      return (row.cacheCreate5m || 0) + (row.cacheCreate30m || 0) + (row.cacheCreate1h || 0);
    }

    function cacheWriteCost(row = {}) {
      const costs = row.costsUsd || {};
      return (costs.cacheCreate5m || 0) + (costs.cacheCreate30m || 0) + (costs.cacheCreate1h || 0);
    }

    function metricCell(tokens, cost) {
      return '<div class="metric-cell"><strong>' + esc(formatTokenCount(tokens)) + '</strong><span>' + esc(formatUsdCompact(cost)) + '</span></div>';
    }

    function totalTokens(row = {}) {
      return (row.input || 0) + tokenCache(row) + (row.output || 0);
    }

    function pricedTokenCache(row = {}) {
      return (row.pricedCacheRead || 0) + (row.pricedCacheCreate5m || 0) + (row.pricedCacheCreate30m || 0) + (row.pricedCacheCreate1h || 0);
    }

    function pricedOutputTokens(row = {}) {
      if (row.pricedOutput > 0) return row.pricedOutput;
      if (row.pricedRequests > 0 && row.pricedRequests === row.requests) return row.output || 0;
      return 0;
    }

    function pricedCost(row = {}) {
      return row.pricedRequests > 0 ? (row.costUsd || 0) : null;
    }

    function totalCostPerMillionOutput(row = {}) {
      const output = pricedOutputTokens(row);
      return output > 0 ? ((row.costUsd || 0) / output) * 1_000_000 : null;
    }

    function outputCostPerMillionOutput(row = {}) {
      const output = pricedOutputTokens(row);
      return output > 0 ? (segmentCost(row, 'output') / output) * 1_000_000 : null;
    }

    function avgPricedCost(row = {}) {
      return row.pricedRequests > 0 ? (row.costUsd || 0) / row.pricedRequests : null;
    }

    function formatNullableUsd(value) {
      return Number.isFinite(value) ? usd.format(value) : 'n/a';
    }

    function formatRatio(part, total) {
      return total > 0 ? formatPct(part / total) : 'n/a';
    }

    function pricedShare(row = {}) {
      return row.requests > 0 ? (row.pricedRequests || 0) / row.requests : 0;
    }

    function cacheReadShare(row = {}) {
      const prompt = (row.pricedInput || 0) + pricedTokenCache(row);
      return prompt > 0 ? (row.pricedCacheRead || 0) / prompt : null;
    }

    function tokenMix(row = {}) {
      const input = row.input || 0;
      const cache = tokenCache(row);
      const output = row.output || 0;
      const total = input + cache + output;
      return {
        input,
        cache,
        output,
        total,
        inputPct: total > 0 ? input / total : 0,
        cachePct: total > 0 ? cache / total : 0,
        outputPct: total > 0 ? output / total : 0,
      };
    }

    function tokenScale(value) {
      return Math.log10(Math.max(0, value) + 1);
    }

    function moneyScale(value) {
      return Math.log10(Math.max(0, value) + 1);
    }

    function projectLabel(name) {
      const text = String(name || '(unknown project)');
      const parts = text.split('/').filter(Boolean);
      return parts.at(-1) || text;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function sizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width || 1));
      const height = Math.max(320, Math.floor(rect.height || 390));
      const dpr = window.devicePixelRatio || 1;
      if (canvas.width !== Math.floor(width * dpr) || canvas.height !== Math.floor(height * dpr)) {
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width, height };
    }

    function drawCanvasCatmullRom(ctx, points, tension = 1) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 0; i < points.length - 1; i += 1) {
        const p0 = points[i - 1] || points[i];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2] || p2;
        const cp1x = p1.x + ((p2.x - p0.x) / 6) * tension;
        const cp1y = p1.y + ((p2.y - p0.y) / 6) * tension;
        const cp2x = p2.x - ((p3.x - p1.x) / 6) * tension;
        const cp2y = p2.y - ((p3.y - p1.y) / 6) * tension;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
      }
    }

    const WHEEL_ZOOM_DELTA_STEP = 80;
    function createSharedMixChart(canvasId, legendId) {
      return {
        canvasId,
        legendId,
        sourceRows: [],
        rows: [],
        nodes: [],
        fullDomain: null,
        domain: null,
        resolution: null,
        interaction: 'pan',
        hoverIndex: null,
        pinnedIndex: null,
        dragStartX: null,
        dragCurrentX: null,
        dragDomain: null,
        plot: null,
        dataKey: null,
        config: null,
        baseConfig: null,
        wheelZoomDelta: 0,
      };
    }

    const dailyTokenChart = createSharedMixChart('daily-token-canvas', 'daily-token-hover-legend');
    const projectChart = createSharedMixChart('project-cost-canvas', 'project-hover-legend');
    projectChart.selectedProject = null;
    projectChart.selectedProjectName = null;
    const sharedMixSegments = [
      { key: 'input', pctKey: 'inputPct', label: 'In', color: () => colors.input },
      { key: 'cache', pctKey: 'cachePct', label: 'Cache', color: () => colors.cache },
      { key: 'output', pctKey: 'outputPct', label: 'Out', color: () => colors.output },
    ];
    const modelPalette = [
      '#2563eb', '#d64b22', '#0f9f6e', '#7c3aed', '#b7791f', '#0891b2',
      '#c0266d', '#5b8c32', '#4f46e5', '#dc2626', '#00897b', '#9333ea',
      '#65a30d', '#0284c7', '#e11d48', '#059669', '#d97706', '#6366f1',
      '#be185d', '#0d9488', '#a16207', '#0369a1', '#6d28d9', '#15803d',
    ];
    const modelColor = TokenomicsTimeline.createCategoricalColorScale(modelPalette);

    function drawSharedModelSeries(ctx, points, config, y) {
      if (!config.showModels) return;
      const keys = [...new Set(points.flatMap(point => (point.row.models || []).map(model => model.name)))];
      for (const key of keys) {
        const color = modelColor(key);
        let run = [];
        const flush = () => {
          if (run.length > 1) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.globalAlpha = .82;
            ctx.lineWidth = 1.5;
            drawCanvasCatmullRom(ctx, run, .75);
            ctx.stroke();
            ctx.restore();
          }
          run = [];
        };
        let previousTime = null;
        for (const point of points) {
          const currentTime = Date.parse(point.row.name.length === 10 ? point.row.name + 'T00:00:00Z' : point.row.name);
          if (previousTime != null && config.intervalMs && currentTime - previousTime > config.intervalMs * 1.5) flush();
          previousTime = currentTime;
          const model = (point.row.models || []).find(candidate => candidate.name === key);
          if (!model) {
            flush();
            continue;
          }
          run.push({ x: point.x, y: y(config.value(model)), model });
        }
        flush();
        for (const point of points) {
          const model = (point.row.models || []).find(candidate => candidate.name === key);
          if (!model) continue;
          ctx.save();
          ctx.fillStyle = color;
          ctx.strokeStyle = colors.panel;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(point.x, y(config.value(model)), 3.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function renderSharedModelTooltip(chart, point, config, canvasWidth) {
      const canvas = document.getElementById(chart.canvasId);
      if (!canvas?.parentElement) return;
      let tooltip = canvas.parentElement.querySelector('.chart-tooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.className = 'chart-tooltip';
        canvas.parentElement.appendChild(tooltip);
      }
      if (!point || !config.showModels) {
        tooltip.classList.remove('visible');
        return;
      }
      const row = point.row;
      const totalCost = row.costUsd || 0;
      const total = totalTokens(row);
      tooltip.innerHTML =
        '<div class="tooltip-title">' + esc(config.title(row)) + '</div>' +
        '<div class="muted">Total ' + esc(formatUsdCompact(totalCost)) + ' · ' + esc(formatTokenCount(total)) + ' tokens</div>' +
        (row.models || []).map(model => {
          const share = config.modelShare
            ? config.modelShare(model, row)
            : (totalCost > 0 ? (model.costUsd || 0) / totalCost : (total > 0 ? totalTokens(model) / total : 0));
          return '<div class="tooltip-row"><div class="tooltip-model"><span class="swatch" style="background:' + esc(modelColor(model.name)) + '"></span><span title="' + esc(model.name) + '">' + esc(model.name) + '</span></div>' +
            '<div class="tooltip-value">' + esc(formatUsdCompact(model.costUsd || 0)) + ' / ' + esc(formatTokenCount(totalTokens(model))) + ' / ' + esc(formatPct(share)) + '</div></div>';
        }).join('');
      tooltip.style.left = Math.max(8, Math.min(point.x + 12, canvasWidth - 432)) + 'px';
      tooltip.style.top = Math.max(8, point.y - 24) + 'px';
      tooltip.classList.add('visible');
    }

    function sharedMixKey(rows, config) {
      return config.key + '|' + rows.map(row => row.name).join('\\u0000');
    }

    function resetSharedChartDomain(chart) {
      chart.dataKey = null;
      chart.fullDomain = null;
      chart.domain = null;
      chart.hoverIndex = null;
      chart.pinnedIndex = null;
    }

    function rerenderSharedMixChart(chart) {
      if (chart.baseConfig) renderSharedMixChart(chart, chart.sourceRows, chart.baseConfig);
    }

    function applySharedDomain(chart, domain) {
      if (!domain || !chart.fullDomain) return;
      chart.domain = domain;
      chart.hoverIndex = null;
      chart.pinnedIndex = null;
      rerenderSharedMixChart(chart);
    }

    function zoomSharedChartAt(chart, canvasX, direction) {
      if (!chart.domain || !chart.fullDomain || !chart.plot) return;
      const ratio = clamp((canvasX - chart.plot.left) / chart.plot.width, 0, 1);
      applySharedDomain(chart, TokenomicsTimeline.zoomDomain(chart.domain, chart.fullDomain, ratio, direction));
    }

    function consumeWheelZoomSteps(chart, deltaY) {
      if (!Number.isFinite(deltaY) || deltaY === 0) return 0;
      if (chart.wheelZoomDelta && Math.sign(chart.wheelZoomDelta) !== Math.sign(deltaY)) chart.wheelZoomDelta = 0;
      chart.wheelZoomDelta += deltaY;
      const rawSteps = Math.trunc(chart.wheelZoomDelta / WHEEL_ZOOM_DELTA_STEP);
      if (!rawSteps) return 0;
      chart.wheelZoomDelta -= rawSteps * WHEEL_ZOOM_DELTA_STEP;
      return clamp(rawSteps, -3, 3);
    }

    function sharedRatioFromX(chart, canvasX) {
      if (!chart.plot) return 0;
      return clamp((canvasX - chart.plot.left) / chart.plot.width, 0, 1);
    }

    function drawSharedSelection(ctx, chart) {
      if (chart.interaction !== 'zoom' || chart.dragStartX == null || chart.dragCurrentX == null || !chart.plot) return;
      const x1 = clamp(chart.dragStartX, chart.plot.left, chart.plot.left + chart.plot.width);
      const x2 = clamp(chart.dragCurrentX, chart.plot.left, chart.plot.left + chart.plot.width);
      const left = Math.min(x1, x2);
      const width = Math.abs(x2 - x1);
      if (width < 2) return;
      ctx.save();
      ctx.fillStyle = 'rgba(37, 99, 235, .14)';
      ctx.strokeStyle = colors.accent;
      ctx.lineWidth = 1;
      ctx.fillRect(left, chart.plot.top, width, chart.plot.height);
      ctx.strokeRect(left, chart.plot.top, width, chart.plot.height);
      ctx.restore();
    }

    function drawSharedPinnedMarker(ctx, node) {
      ctx.save();
      ctx.strokeStyle = colors.muted;
      ctx.fillStyle = colors.panel;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(node.x, node.y - 8);
      ctx.lineTo(node.x, node.y - 15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(node.x, node.y - 21);
      ctx.lineTo(node.x + 4, node.y - 17);
      ctx.lineTo(node.x, node.y - 13);
      ctx.lineTo(node.x - 4, node.y - 17);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawSharedHoverGuide(ctx, node, plot, label) {
      const text = label.length > 20 ? label.slice(0, 19) + '…' : label;
      ctx.save();
      ctx.strokeStyle = colors.axis;
      ctx.globalAlpha = .7;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.moveTo(node.x, plot.top);
      ctx.lineTo(node.x, plot.top + plot.height);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      ctx.font = '600 11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      const chipWidth = Math.min(plot.width, ctx.measureText(text).width + 16);
      const chipX = clamp(node.x - chipWidth / 2, plot.left, plot.left + plot.width - chipWidth);
      const chipY = plot.top + plot.height + 36;
      ctx.fillStyle = colors.fg;
      ctx.beginPath();
      ctx.roundRect(chipX, chipY, chipWidth, 22, 4);
      ctx.fill();
      ctx.fillStyle = colors.panel;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, chipX + chipWidth / 2, chipY + 11);
      ctx.restore();
    }

    function drawSharedPoint(ctx, node, { hovered = false, pinned = false } = {}) {
      ctx.save();
      if (hovered) {
        ctx.globalAlpha = .22;
        ctx.fillStyle = colors.axis;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = hovered ? colors.fg : (pinned ? colors.fg : colors.axis);
      ctx.strokeStyle = colors.panel;
      ctx.lineWidth = hovered ? 3 : 1.5;
      ctx.beginPath();
      ctx.arc(node.x, node.y, hovered ? 6 : (pinned ? 4.5 : 3.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
      if (pinned && !hovered) drawSharedPinnedMarker(ctx, node);
    }

    function sharedMixLegendContent(row, config) {
      const mix = config.mix(row);
      return '<strong title="' + esc(config.title(row)) + '">' + esc(config.displayTitle(row)) + '</strong>' +
        '<span>' + esc(config.valueText(row)) + '</span>' +
        sharedMixSegments.map(segment => (
          '<span class="mix-pill"><span class="swatch" style="background:' + esc(segment.color()) + '"></span>' +
          esc(segment.label) + ' ' + esc(segmentShareText(row, segment, mix)) + '</span>'
        )).join('') + (config.extraLegend ? config.extraLegend(row) : '');
    }

    function renderSharedMixLegend(chart, row, config) {
      const el = document.getElementById(chart.legendId);
      if (!el) return;
      if (!row) {
        el.innerHTML = '<span class="muted">' + esc(config.emptyText) + '</span>';
        return;
      }
      const total = config.summaryRow || row;
      const detail = row !== total && row.name !== 'Total' ? row : null;
      el.innerHTML = '<div class="legend-line">' + sharedMixLegendContent(total, config) + '</div>' +
        (detail ? '<div class="legend-line">' + sharedMixLegendContent(detail, config) + '</div>' : '');
    }

    function renderSharedMixChart(chart, sourceRows, config) {
      const canvas = document.getElementById(chart.canvasId);
      if (!canvas) return;
      canvas.dataset.interaction = chart.interaction;
      canvas.title = chart.interaction === 'pan'
        ? 'Hover to inspect the nearest interval. Drag to move through time. Wheel to zoom. Double-click to reset.'
        : 'Hover to inspect the nearest interval. Drag to select a range. Wheel to zoom. Double-click to reset.';
      const nextRows = sourceRows || [];
      const nextKey = sharedMixKey(nextRows, config);
      const dataChanged = nextKey !== chart.dataKey;
      chart.sourceRows = nextRows;
      chart.baseConfig = config;
      chart.dataKey = nextKey;
      const { ctx, width, height } = sizeCanvas(canvas);
      ctx.clearRect(0, 0, width, height);
      if (nextRows.length === 0) {
        chart.rows = [];
        chart.nodes = [];
        chart.plot = null;
        chart.config = config;
        renderSharedMixLegend(chart, null, config);
        renderSharedModelTooltip(chart, null, config, width);
        ctx.save();
        ctx.fillStyle = colors.muted;
        ctx.font = '13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillText(config.emptyText, 24, 48);
        ctx.restore();
        return;
      }
      const fullDomain = config.fullDomain || TokenomicsTimeline.domainForRows(nextRows);
      if (dataChanged || !chart.domain || !chart.fullDomain) {
        chart.fullDomain = fullDomain;
        chart.domain = { ...fullDomain };
        chart.hoverIndex = null;
        chart.pinnedIndex = null;
      }

      const margin = { top: 24, right: 24, bottom: 78, left: 78 };
      const plot = { left: margin.left, top: margin.top, width: width - margin.left - margin.right, height: height - margin.top - margin.bottom };
      chart.plot = plot;
      const pointBudget = Math.max(96, Math.min(180, Math.floor(plot.width / 7)));
      const resolution = TokenomicsTimeline.chooseAdaptiveResolution(chart.domain.start, chart.domain.end, pointBudget);
      const intervalMs = TokenomicsTimeline.resolutionIntervalMs(resolution);
      const filtered = nextRows.filter(row => {
        const time = TokenomicsTimeline.periodStart(row.name);
        return time >= chart.domain.start && time < chart.domain.end;
      });
      const visible = aggregateTimelineRows(filtered, resolution);
      const resolvedConfig = {
        ...config,
        intervalMs,
        resolution,
        summaryRow: {
          name: 'Total',
          rangeLabel: visibleDomainLabel(chart.domain, resolution, Boolean(config.localCalendarRange)),
          ...sumPeriodStats(filtered),
        },
        yLabel: typeof config.yLabel === 'function' ? config.yLabel(resolution) : config.yLabel,
      };
      chart.rows = visible;
      chart.config = resolvedConfig;
      chart.resolution = resolution;
      const maxValue = Math.max(1, ...visible.map(row => resolvedConfig.value(row)));
      const maxScaled = Math.max(1, resolvedConfig.scale(maxValue));
      const domainSpan = Math.max(TokenomicsTimeline.QUARTER_HOUR_MS, chart.domain.end - chart.domain.start);
      const x = row => {
        if (visible.length === 1) return plot.left + plot.width / 2;
        const center = TokenomicsTimeline.bucketCenter(row.name, resolution);
        return plot.left + clamp((center - chart.domain.start) / domainSpan, 0, 1) * plot.width;
      };
      const y = value => plot.top + plot.height - (resolvedConfig.scale(value) / maxScaled) * plot.height;

      ctx.save();
      ctx.font = '11px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textBaseline = 'middle';
      for (const tick of [0, .25, .5, .75, 1]) {
        const yy = plot.top + plot.height - tick * plot.height;
        ctx.strokeStyle = colors.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(plot.left, yy);
        ctx.lineTo(plot.left + plot.width, yy);
        ctx.stroke();
        ctx.fillStyle = colors.muted;
        ctx.textAlign = 'right';
        ctx.fillText(resolvedConfig.axisText(Math.max(0, (10 ** (maxScaled * tick)) - 1)), plot.left - 10, yy);
      }

      ctx.strokeStyle = colors.axis;
      ctx.beginPath();
      ctx.moveTo(plot.left, plot.top);
      ctx.lineTo(plot.left, plot.top + plot.height);
      ctx.lineTo(plot.left + plot.width, plot.top + plot.height);
      ctx.stroke();

      for (const index of TokenomicsTimeline.tickIndexes(visible.length, width < 760 ? 5 : 8)) {
        const xx = x(visible[index]);
        const rawLabel = resolvedConfig.xLabel(visible[index]);
        const label = rawLabel.length > 22 ? rawLabel.slice(0, 21) + '…' : rawLabel;
        ctx.strokeStyle = colors.axis;
        ctx.beginPath();
        ctx.moveTo(xx, plot.top + plot.height);
        ctx.lineTo(xx, plot.top + plot.height + 5);
        ctx.stroke();
        ctx.save();
        ctx.translate(xx, plot.top + plot.height + 14);
        ctx.rotate(-Math.PI / 7);
        ctx.fillStyle = colors.muted;
        ctx.textAlign = 'right';
        ctx.fillText(label, 0, 0);
        ctx.restore();
      }

      const points = visible.map((row, index) => ({ x: x(row), y: y(resolvedConfig.value(row)), row, globalIndex: index }));
      ctx.strokeStyle = colors.fg;
      ctx.globalAlpha = resolvedConfig.showModels ? .28 : .55;
      ctx.lineWidth = 2.2;
      drawCanvasCatmullRom(ctx, points, .9);
      ctx.stroke();
      ctx.globalAlpha = 1;

      chart.nodes = points;
      const hoverPoint = points.find(point => point.globalIndex === chart.hoverIndex) || null;
      const pinnedPoint = resolvedConfig.pinOnClick ? points.find(point => point.globalIndex === chart.pinnedIndex) || null : null;
      if (hoverPoint) drawSharedHoverGuide(ctx, hoverPoint, plot, resolvedConfig.xLabel(hoverPoint.row));
      drawSharedModelSeries(ctx, points, resolvedConfig, y);
      for (const point of points) {
        drawSharedPoint(ctx, point, {
          hovered: point.globalIndex === chart.hoverIndex,
          pinned: resolvedConfig.pinOnClick && point.globalIndex === chart.pinnedIndex,
        });
      }

      ctx.fillStyle = colors.muted;
      ctx.textAlign = 'center';
      ctx.save();
      ctx.translate(18, plot.top + plot.height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(resolvedConfig.yLabel, 0, 0);
      ctx.restore();

      drawSharedSelection(ctx, chart);
      const legendRow = chart.hoverIndex != null
        ? chart.rows[chart.hoverIndex]
        : (resolvedConfig.pinOnClick && chart.pinnedIndex != null
          ? chart.rows[chart.pinnedIndex]
          : resolvedConfig.summaryRow);
      renderSharedMixLegend(chart, legendRow, resolvedConfig);
      renderSharedModelTooltip(chart, hoverPoint || pinnedPoint, resolvedConfig, width);
      ctx.restore();
    }

    function bindSharedMixCanvas(chart) {
      const canvas = document.getElementById(chart.canvasId);
      if (!canvas) return;
      const nearestNode = (x, y) => {
        const plot = chart.plot;
        if (!plot || x < plot.left || x > plot.left + plot.width || y < plot.top || y > plot.top + plot.height) return null;
        return TokenomicsTimeline.nearestPointByX(chart.nodes, x);
      };
      canvas.addEventListener('mousemove', event => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        if (chart.dragStartX != null && chart.interaction === 'pan' && chart.dragDomain && chart.plot) {
          chart.dragCurrentX = x;
          chart.domain = TokenomicsTimeline.panDomain(
            chart.dragDomain,
            chart.fullDomain,
            (x - chart.dragStartX) / chart.plot.width,
          );
          chart.hoverIndex = null;
          rerenderSharedMixChart(chart);
          return;
        }
        const nearest = nearestNode(x, y);
        if (nearest) {
          chart.hoverIndex = nearest.globalIndex;
          rerenderSharedMixChart(chart);
        } else if (chart.hoverIndex != null) {
          chart.hoverIndex = null;
          rerenderSharedMixChart(chart);
        }
        if (chart.dragStartX != null) {
          chart.dragCurrentX = x;
          rerenderSharedMixChart(chart);
        }
      });
      canvas.addEventListener('mouseleave', () => {
        chart.hoverIndex = null;
        chart.dragStartX = null;
        chart.dragCurrentX = null;
        chart.dragDomain = null;
        rerenderSharedMixChart(chart);
      });
      canvas.addEventListener('mousedown', event => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        if (!chart.plot || x < chart.plot.left || x > chart.plot.left + chart.plot.width) return;
        chart.dragStartX = x;
        chart.dragCurrentX = x;
        chart.dragDomain = chart.domain ? { ...chart.domain } : null;
      });
      window.addEventListener('mouseup', event => {
        if (chart.dragStartX == null) return;
        const rect = canvas.getBoundingClientRect();
        const endX = event.clientX - rect.left;
        const startX = chart.dragStartX;
        const interaction = chart.interaction;
        chart.dragStartX = null;
        chart.dragCurrentX = null;
        chart.dragDomain = null;
        if (Math.abs(endX - startX) < 14) {
          if (chart.config?.pinOnClick) {
            const endY = event.clientY - rect.top;
            const node = nearestNode(endX, endY);
            chart.pinnedIndex = node && chart.pinnedIndex !== node.globalIndex ? node.globalIndex : null;
            chart.hoverIndex = node?.globalIndex ?? null;
          }
          rerenderSharedMixChart(chart);
          return;
        }
        if (interaction === 'pan') {
          rerenderSharedMixChart(chart);
        } else {
          applySharedDomain(chart, TokenomicsTimeline.selectDomain(
            chart.domain,
            chart.fullDomain,
            sharedRatioFromX(chart, startX),
            sharedRatioFromX(chart, endX),
          ));
        }
      });
      canvas.addEventListener('wheel', event => {
        event.preventDefault();
        if (Math.abs(event.deltaX) > Math.abs(event.deltaY) && chart.domain && chart.fullDomain && chart.plot) {
          applySharedDomain(chart, TokenomicsTimeline.panDomain(
            chart.domain,
            chart.fullDomain,
            -event.deltaX / chart.plot.width,
          ));
          return;
        }
        const steps = consumeWheelZoomSteps(chart, event.deltaY);
        if (!steps) return;
        const rect = canvas.getBoundingClientRect();
        zoomSharedChartAt(chart, event.clientX - rect.left, steps);
      }, { passive: false });
      canvas.addEventListener('dblclick', () => {
        if (chart.fullDomain) applySharedDomain(chart, { ...chart.fullDomain });
      });
    }

    let cachedSummary = null;
